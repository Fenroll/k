            }

            function escapeAttribute(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/"/g, '&quot;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function getCurrentSelectionOffsets() {
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) return null;

                const range = selection.getRangeAt(0);
                if (!els.courseNotesEditor.contains(range.startContainer) || !els.courseNotesEditor.contains(range.endContainer)) {
                    return null;
                }

                const startRange = document.createRange();
                startRange.selectNodeContents(els.courseNotesEditor);
                startRange.setEnd(range.startContainer, range.startOffset);
                const start = getRangeTextLength(startRange);
                const length = getRangeTextLength(range);

                return {
                    start,
                    end: start + length
                };
            }

            function isBlockLikeElement(node) {
                if (!node || node.nodeType !== Node.ELEMENT_NODE) return false;
                const tag = node.nodeName;
                return tag === 'DIV' || tag === 'P' || tag === 'LI' || tag === 'H1' || tag === 'H2' || tag === 'H3' || tag === 'H4' || tag === 'BLOCKQUOTE';
            }

            function getRangeTextLength(range) {
                const fragment = range.cloneContents();
                let length = 0;

                const walk = (node) => {
                    if (!node) return;
                    const children = Array.from(node.childNodes || []);
                    children.forEach((child) => {
                        if (child.nodeType === Node.TEXT_NODE) {
                            length += (child.textContent || '').length;
                        } else if (child.nodeType === Node.ELEMENT_NODE) {
                            if (child.nodeName === 'BR') {
                                length += 1;
                            } else {
                                walk(child);
                                if (isBlockLikeElement(child)) {
                                    length += 1;
                                }
                            }
                        }
                    });
                };

                walk(fragment);
                if (length > 0) {
                    const last = fragment.lastChild;
                    if (last && isBlockLikeElement(last)) {
                        length -= 1;
                    }
                }
                return length;
            }

            function resolvePositionByOffset(root, targetOffset) {
                const offset = Math.max(0, Number.isFinite(targetOffset) ? targetOffset : 0);

                let current = 0;
                let resolved = null;

                const walk = (node) => {
                    if (resolved || !node) return;
                    const children = Array.from(node.childNodes || []);

                    for (const child of children) {
                        if (resolved) return;

                        if (child.nodeType === Node.TEXT_NODE) {
                            const len = (child.textContent || '').length;
                            if (offset <= current + len) {
                                resolved = { node: child, offset: Math.max(0, offset - current) };
                                return;
                            }
                            current += len;
                            continue;
                        }

                        if (child.nodeType !== Node.ELEMENT_NODE) continue;

                        if (child.nodeName === 'BR') {
                            if (offset <= current + 1) {
                                const parent = child.parentNode;
                                if (parent) {
                                    const index = Array.prototype.indexOf.call(parent.childNodes, child);
                                    resolved = { node: parent, offset: index + 1 };
                                    return;
                                }
                            }
                            current += 1;
                            continue;
                        }

                        walk(child);
                        if (resolved) return;

                        if (isBlockLikeElement(child)) {
                            if (offset <= current + 1) {
                                const parent = child.parentNode;
                                if (parent) {
                                    const index = Array.prototype.indexOf.call(parent.childNodes, child);
                                    resolved = { node: parent, offset: index + 1 };
                                    return;
                                }
                            }
                            current += 1;
                        }
                    }
                };

                walk(root);

                if (resolved) {
                    return resolved;
                }

                return { node: root, offset: root.childNodes.length };
            }

            function createRangeFromOffsets(root, start, end) {
                if (!root || !Number.isFinite(start) || !Number.isFinite(end) || end < start) return null;

                const startPos = resolvePositionByOffset(root, start);
                const endPos = resolvePositionByOffset(root, end);
                if (!startPos || !endPos || !startPos.node || !endPos.node) return null;

                const range = document.createRange();
                range.setStart(startPos.node, startPos.offset);
                range.setEnd(endPos.node, endPos.offset);
                return range;
            }

            function getEditorTextLength() {
                const walker = document.createTreeWalker(els.courseNotesEditor, NodeFilter.SHOW_TEXT);
                let length = 0;
                while (walker.nextNode()) {
                    length += (walker.currentNode.textContent || '').length;
                }
                return length;
            }

            function clearSelectionOverlay() {
                if (els.selectionOverlay) {
                    els.selectionOverlay.innerHTML = '';
                }
            }

            function getCaretRectFromRange(range) {
                if (!range) return null;

                const rects = Array.from(range.getClientRects ? range.getClientRects() : []);
                const visibleRect = rects.find(rect => rect && (rect.width || rect.height));
                if (visibleRect) return visibleRect;

                const rect = range.getBoundingClientRect();
                if (rect && (rect.width || rect.height)) return rect;

                if (range.startContainer && range.startContainer.nodeType === Node.TEXT_NODE) {
                    const text = range.startContainer.textContent || '';
                    const offset = Math.max(0, Math.min(range.startOffset, text.length));
                    if (offset > 0) {
                        const fallbackRange = document.createRange();
                        fallbackRange.setStart(range.startContainer, offset - 1);
                        fallbackRange.setEnd(range.startContainer, offset);
                        const fallbackRects = Array.from(fallbackRange.getClientRects ? fallbackRange.getClientRects() : []);
                        const fallbackRect = fallbackRects[fallbackRects.length - 1] || fallbackRange.getBoundingClientRect();
                        if (fallbackRect && (fallbackRect.width || fallbackRect.height)) {
                            return {
                                left: fallbackRect.right,
                                right: fallbackRect.right,
                                top: fallbackRect.top,
                                bottom: fallbackRect.bottom,
                                width: 0,
                                height: fallbackRect.height
                            };
                        }
                    }
                }

                return null;
            }

            function renderRemoteSelections(activeEntries) {
                clearSelectionOverlay();
                if (!els.selectionOverlay || !els.courseNotesEditor || !Array.isArray(activeEntries)) return;

                const currentUid = String(state.currentUser?.userId || state.currentUser?.uid || '');
                const overlayRect = els.selectionOverlay.getBoundingClientRect();
                const editorRect = els.courseNotesEditor.getBoundingClientRect();

                activeEntries.forEach((entry) => {
                    const uid = String(entry.userId || '');
                    if (!uid || uid === currentUid || !entry.typing) return;

                    const sel = entry.selection || state.liveblocksLastSelections[uid];
                    if (!sel || !Number.isFinite(sel.start) || !Number.isFinite(sel.end)) return;

                    const caretOffset = Math.max(sel.start, sel.end);
                    const range = createRangeFromOffsets(els.courseNotesEditor, caretOffset, caretOffset);
                    if (!range) return;

                    let rect = getCaretRectFromRange(range);

                    if (!rect || (!rect.width && !rect.height)) return;
                    if (rect.bottom < editorRect.top || rect.top > editorRect.bottom) return;

                    const previousRect = state.liveblocksLastCaretRects[uid];
                    const lineHeight = Math.max(16, rect.height || previousRect?.height || 18);
                    const looksLikeBoundaryJump = previousRect &&
                        Math.abs(rect.top - previousRect.top) > lineHeight * 0.65 &&
                        Math.abs(rect.left - previousRect.left) < 18;

                    if (looksLikeBoundaryJump) {
                        rect = previousRect;
                    } else {
                        state.liveblocksLastCaretRects[uid] = {
                            left: rect.left,
                            right: rect.right,
                            top: rect.top,
                            bottom: rect.bottom,
                            width: rect.width,
                            height: rect.height
                        };
                    }

                    const profile = getCollabProfile(uid, entry);
                    const caret = document.createElement('div');
                    caret.className = 'remote-caret';
                    caret.title = profile.name;
                    caret.style.background = profile.color;
                    caret.style.left = `${Math.max(0, (rect.right || rect.left) - overlayRect.left)}px`;
                    caret.style.top = `${Math.max(0, rect.top - overlayRect.top)}px`;
                    caret.style.height = `${Math.max(16, rect.height || 18)}px`;
                    els.selectionOverlay.appendChild(caret);
                });
            }

            function stopLiveblocksPresence() {
                if (state.liveblocksStartTimer) {
                    clearTimeout(state.liveblocksStartTimer);
                    state.liveblocksStartTimer = null;
                }
                if (state.liveblocksDocBroadcastTimer) {
                    clearTimeout(state.liveblocksDocBroadcastTimer);
                    state.liveblocksDocBroadcastTimer = null;
                }
                if (state.liveblocksPollTimer) {
                    clearInterval(state.liveblocksPollTimer);
                    state.liveblocksPollTimer = null;
                }

                if (state.liveblocksLeave) {
                    state.liveblocksLeave();
                }

                state.liveblocksRoom = null;
                state.liveblocksRoomId = '';
                state.liveblocksLeave = null;
                state.liveblocksOthers = [];
                state.liveblocksConnected = false;
                state.liveblocksRenderHash = '';
                state.liveblocksLastSelections = {};
                state.liveblocksLastCaretRects = {};
                clearSelectionOverlay();
                setCollabSimpleStatus('Offline');
            }

            function buildLiveblocksPresencePayload(overrides = {}) {
                const userId = state.currentUser?.userId || 'unknown';
                return {
                    userId,
                    typing: !!state.localIsTyping,
                    selection: state.isEditorFocused ? getCurrentSelectionOffsets() : null,
                    ...overrides
                };
            }

            function normalizeLiveblocksOthers(input) {
                if (!input) return [];
                if (Array.isArray(input)) return input;
                if (typeof input.toArray === 'function') return input.toArray();
                if (input.others && Array.isArray(input.others)) return input.others;
                if (input.others && typeof input.others.toArray === 'function') return input.others.toArray();
                try {
                    return Array.from(input);
                } catch (_error) {
                    return [];
                }
            }

            function renderLiveblocksOthers(othersInput, force = false) {
                const others = normalizeLiveblocksOthers(othersInput);
                if (!Array.isArray(others)) {
                    clearSelectionOverlay();
                    if (state.liveblocksConnected) {
                        setCollabSimpleStatus('Offline');
                    } else {
                        setCollabSimpleStatus('Offline');
                    }
                    return;
                }

                const entries = others.map((other) => other.presence || {}).filter(Boolean);
                if (state.liveblocksConnected && state.currentUser) {
                    entries.unshift(buildLiveblocksPresencePayload());
                }
                entries.forEach((entry) => {
                    const uid = String(entry.userId || '');
                    const sel = entry.selection;
                    if (!uid) return;

                    if (sel && Number.isFinite(sel.start) && Number.isFinite(sel.end) && sel.end >= sel.start) {
                        state.liveblocksLastSelections[uid] = { start: sel.start, end: sel.end };
                    } else if (entry.typing && state.liveblocksLastSelections[uid]) {
                        entry.selection = { ...state.liveblocksLastSelections[uid] };
                    }

                    if (entry.typing && state.liveblocksLastSelections[uid]) {
                        entry.selection = { ...state.liveblocksLastSelections[uid] };
                    }
                });

                const renderHash = JSON.stringify(entries.map(item => ({
                    userId: item.userId || '',
                    profileName: getCollabProfile(item.userId, item).name,
                    profileAvatar: getCollabProfile(item.userId, item).avatar,
                    profileColor: getCollabProfile(item.userId, item).color,
                    typing: !!item.typing,
                    start: item.selection?.start ?? null,
                    end: item.selection?.end ?? null
                })));

                if (!force && renderHash === state.liveblocksRenderHash) {
                    return;
                }
                state.liveblocksRenderHash = renderHash;

                if (els.collabStatus) {
                    if (entries.length > 0) {
                        const uniqueUsers = [];
                        const seen = new Set();
                        entries.forEach((item) => {
                            const uid = String(item.userId || item.name || 'unknown');
                            if (seen.has(uid)) return;
                            seen.add(uid);
                            uniqueUsers.push(item);
                        });

                        const avatars = uniqueUsers.map((item) => {
                            const profile = getCollabProfile(item.userId, item);
                            const color = profile.color;
                            const name = profile.name;
                            const initial = escapeHtml(name.charAt(0).toUpperCase() || '?');
                            const safeTitle = escapeHtml(name);
                            const avatarUrl = profile.avatar;
                            if (avatarUrl) {
                                return `<span class="collab-avatar" title="${safeTitle}" style="background:${color}"><img src="${escapeAttribute(avatarUrl)}" alt="${safeTitle}" referrerpolicy="no-referrer"></span>`;
                            }
                            return `<span class="collab-avatar" title="${safeTitle}" style="background:${color}">${initial}</span>`;
                        }).join('');

                        els.collabStatus.classList.add('has-active');
                        els.collabStatus.innerHTML = `<span class="collab-avatars-wrap"><span>Active:</span>${avatars}</span>`;
                    } else {
                        if (state.liveblocksConnected) {
                            setCollabSimpleStatus('Offline');
                        } else {
                            setCollabSimpleStatus('Offline');
                        }
                    }
                }

                renderRemoteSelections(entries);
            }

            async function ensureLiveblocksModule() {
                if (state.liveblocksModule) return;
                state.liveblocksModule = await import('https://cdn.jsdelivr.net/npm/@liveblocks/client/+esm');
            }

            async function startLiveblocksPresence() {
                if (!state.liveblocksEnabled || !state.selectedCourseId) return;

                if (state.liveblocksStartTimer) {
                    clearTimeout(state.liveblocksStartTimer);
                    state.liveblocksStartTimer = null;
                }

                const roomId = `${LIVEBLOCKS_ROOM_PREFIX}${state.selectedCourseId}`;
                if (state.liveblocksRoom && state.liveblocksRoomId === roomId) {
                    return;
                }

                state.liveblocksStartTimer = setTimeout(async () => {
                    state.liveblocksStartTimer = null;
                    await startLiveblocksPresenceNow(roomId);
                }, LIVEBLOCKS_START_DELAY_MS);
            }

            async function startLiveblocksPresenceNow(roomId) {
                if (!state.liveblocksEnabled || !state.selectedCourseId) return;

                if (state.liveblocksRoom && state.liveblocksRoomId === roomId) return;

                stopLiveblocksPresence();

                try {
                    setCollabSimpleStatus('Offline');

                    await ensureLiveblocksModule();
                    if (!state.liveblocksClient) {
                        state.liveblocksClient = state.liveblocksModule.createClient({
                            authEndpoint: async (room) => {
                                const user = state.currentUser || await window.currentUserPromise;
                                const payload = {
                                    room,
                                    userId: String(user?.userId || 'unknown')
                                };

                                const isLocalFileOrigin =
                                    window.location.protocol === 'file:' ||
                                    window.location.origin === 'null';

                                const endpointCandidates = isLocalFileOrigin
                                    ? [
                                        LIVEBLOCKS_AUTH_FALLBACK_ENDPOINT,
                                        LIVEBLOCKS_AUTH_ENDPOINT
                                    ]
                                    : [
                                        LIVEBLOCKS_AUTH_ENDPOINT,
                                        'https://coursebook.lol/liveblocks-auth',
                                        LIVEBLOCKS_AUTH_FALLBACK_ENDPOINT
                                    ];

                                const endpoints = Array.from(new Set(endpointCandidates.filter(Boolean)));

                                let lastError = null;
                                for (const endpoint of endpoints) {
                                    try {
                                        const authResponse = await fetch(endpoint, {
                                            method: 'POST',
                                            headers: {
                                                'Content-Type': 'application/json',
                                                'x-user-id': String(user?.userId || 'unknown')
                                            },
                                            body: JSON.stringify(payload)
                                        });

                                        if (!authResponse.ok) {
                                            const reason = await authResponse.text();
                                            lastError = new Error(`Liveblocks auth failed (${authResponse.status}) via ${endpoint}: ${reason || 'No reason'}`);
                                            continue;
                                        }

                                        if (endpoint !== LIVEBLOCKS_AUTH_ENDPOINT) {
                                            console.warn('Liveblocks auth endpoint fallback used:', endpoint);
                                        }
                                        return await authResponse.json();
                                    } catch (error) {
                                        lastError = error;
                                    }
                                }

                                throw lastError || new Error('Liveblocks auth failed on all endpoints');
                            }
                        });
                    }

                    const entered = state.liveblocksClient.enterRoom(roomId, {
                        initialPresence: buildLiveblocksPresencePayload({ typing: false, selection: null })
                    });

                    state.liveblocksRoom = entered.room;
                    state.liveblocksRoomId = roomId;
                    state.liveblocksLeave = entered.leave;
                    setCollabSimpleStatus('Offline');

                    if (typeof state.liveblocksRoom.subscribe === 'function') {
                        state.liveblocksRoom.subscribe('status', (status) => {
                            if (status === 'connected') {
                                state.liveblocksConnected = true;
                            } else if (status === 'connecting') {
                                state.liveblocksConnected = false;
                            } else {
                                state.liveblocksConnected = false;
                            }
                            renderLiveblocksOthers(state.liveblocksOthers || [], true);
                        });
                    }

                    state.liveblocksRoom.subscribe('others', (others) => {
                        const list = normalizeLiveblocksOthers(others);
                        state.liveblocksOthers = list;
                        renderLiveblocksOthers(list);
                    });

                    if (typeof state.liveblocksRoom.getOthers === 'function') {
                        state.liveblocksPollTimer = setInterval(() => {
                            try {
                                const polled = state.liveblocksRoom.getOthers();
                                const list = normalizeLiveblocksOthers(polled);
                                state.liveblocksOthers = list;
                                renderLiveblocksOthers(list);
                            } catch (_error) {
                            }
                        }, 1500);
                    }

                    state.liveblocksRoom.subscribe('event', ({ event }) => {
                        if (!event || event.type !== 'doc-update') return;
                        if (event.userId === (state.currentUser?.userId || 'unknown')) return;
                        if (typeof event.html !== 'string') return;
                        if (event.html === getEditorHtml()) return;

                        const remoteUserId = String(event.userId || '');
                        if (remoteUserId && Number.isFinite(event.selectionStart) && Number.isFinite(event.selectionEnd)) {
                            state.liveblocksLastSelections[remoteUserId] = {
                                start: event.selectionStart,
                                end: event.selectionEnd
                            };
                        }

                        const userIsTyping = state.isEditorFocused && state.localIsTyping;
                        if (!userIsTyping) {
                            setEditorHtml(event.html);
                            normalizeAuthorTitles();
                            state.lastSavedHtml = normalizeHtml(event.html);
                            setDraftState(false);
                        }
                    });
                } catch (error) {
                    console.error('Liveblocks init failed:', error);
                    setCollabSimpleStatus('Offline');
                    stopLiveblocksPresence();
                }
            }

            function scheduleLiveblocksDocBroadcast() {
                if (!state.liveblocksRoom) return;
                if (state.liveblocksDocBroadcastTimer) {
                    clearTimeout(state.liveblocksDocBroadcastTimer);
                }
                state.liveblocksDocBroadcastTimer = setTimeout(() => {
                    if (!state.liveblocksRoom) return;
                    const html = getEditorHtml();
                    const selection = getCurrentSelectionOffsets();
                    state.liveblocksRoom.broadcastEvent({
                        type: 'doc-update',
                        userId: state.currentUser?.userId || 'unknown',
                        html,
                        selectionStart: Number.isFinite(selection?.start) ? selection.start : null,
                        selectionEnd: Number.isFinite(selection?.end) ? selection.end : null,
                        updatedAt: Date.now()
                    });
                }, 45);
            }

            function scheduleRealtimePresenceFlush(isTypingPulse = false) {
                if (!state.liveblocksRoom) return;
                if (isTypingPulse) {
                    state.localIsTyping = true;
                    if (state.presenceTypingTimer) clearTimeout(state.presenceTypingTimer);
                    state.presenceTypingTimer = setTimeout(() => {
                        state.localIsTyping = false;
                        state.liveblocksRoom?.updatePresence(buildLiveblocksPresencePayload({ typing: false }));
                    }, 1300);
                }
                setTimeout(() => {
                    state.liveblocksRoom?.updatePresence(buildLiveblocksPresencePayload());
                }, 70);
            }

            function normalizeSeparatorLines() {
                const blocks = Array.from(els.courseNotesEditor.querySelectorAll('p,div'));
                blocks.forEach((block) => {
                    if (!block || !block.parentNode) return;
                    if (block.querySelector('hr')) return;
                    const text = (block.textContent || '').replace(/\u200b/g, '').trim();
                    if (text !== '---') return;

                    const hr = document.createElement('hr');
                    hr.style.border = 'none';
                    hr.style.borderTop = '1px solid #d1d5db';
                    hr.style.margin = '8px 0';
                    block.parentNode.replaceChild(hr, block);
                });
            }

            const COURSE_ACCENT_PALETTE = ["#6fcf97","#81c7f5","#ffe066","#ff6f7d","#c8a2ff","#ffb46a","#62d7a1","#5fa8ff","#ffd166","#ff7f7f","#bfa6ff","#f9a66c","#7ad66f","#6ea8fe","#f6d365","#ff8b94","#d4a5ff","#d7b899","#7cc6a6","#4fc3f7","#ffd57e","#ff8fa3","#c7b8ff","#cfa18d","#75d0b1","#74b9d6","#f4c95d","#ff9a8b","#b39ddb","#8dd3b3","#8fc0ff","#f9d976","#f28b82","#c6a4ff","#98e0cc","#7da0fa","#ffdf8a","#ff7a8a","#7ec8c3","#9bb3ff","#f7e27d","#ff8298","#66d1c2","#a8d8ff","#f3d86f","#ff7388","#58c9b9","#6ec5ff","#f6cf65","#f97f7f","#4fd1a6","#5fb8f9","#ff647c","#70d6b5","#7fb7ff","#ff5f75","#ff6b7a"];
            function familyOf(hex) {
                // Simple bucket by hue ranges from the palette grouping (green/blue/yellow/red/purple/orange)
                const greens = new Set(["#6fcf97","#62d7a1","#7ad66f","#7cc6a6","#75d0b1","#8dd3b3","#98e0cc","#7ec8c3","#66d1c2","#58c9b9","#4fd1a6","#70d6b5"]);
                const blues  = new Set(["#81c7f5","#5fa8ff","#6ea8fe","#4fc3f7","#74b9d6","#8fc0ff","#7da0fa","#9bb3ff","#a8d8ff","#6ec5ff","#5fb8f9","#7fb7ff"]);
                const yellows= new Set(["#ffe066","#ffd166","#f6d365","#ffd57e","#f4c95d","#f9d976","#ffdf8a","#f7e27d","#f3d86f","#f6cf65"]);
                const reds   = new Set(["#ff6f7d","#ff7f7f","#ff8b94","#ff8fa3","#ff9a8b","#f28b82","#ff7a8a","#ff8298","#ff7388","#f97f7f","#ff647c","#ff5f75","#ff6b7a"]);
                const purples= new Set(["#c8a2ff","#bfa6ff","#d4a5ff","#c7b8ff","#b39ddb","#c6a4ff"]);
                const oranges= new Set(["#ffb46a","#f9a66c","#d7b899","#cfa18d"]);
                if (greens.has(hex)) return 'g';
                if (blues.has(hex)) return 'b';
                if (yellows.has(hex)) return 'y';
                if (reds.has(hex)) return 'r';
                if (purples.has(hex)) return 'p';
                if (oranges.has(hex)) return 'y';
                return '?';
            }

            let __courseAccentOrder = null;
            function buildCourseAccentOrder(palette) {
                const arr = palette.slice();
                let seed = 0x9e3779b9;
                const rnd = () => { seed ^= seed<<13; seed ^= seed>>>17; seed ^= seed<<5; return (seed>>>0)/4294967296; };
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(rnd() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                // Multi-pass: ensure none of the previous 2 colors are in the same family
                const W = 2;
                for (let pass = 0; pass < 4; pass++) {
                    let changed = false;
                    for (let i = 1; i < arr.length; i++) {
                        const fam = familyOf(arr[i]);
                        const conflict = [];
                        for (let w = 1; w <= W && i - w >= 0; w++) conflict.push(familyOf(arr[i - w]));
                        if (!conflict.includes(fam)) continue;
                        for (let k = i + 1; k < arr.length; k++) {
                            const kFam = familyOf(arr[k]);
                            if (conflict.includes(kFam)) continue;
                            // also check k won't break its new neighbors
                            const kPrev = i > 0 ? familyOf(arr[i - 1]) : null;
                            if (kFam === kPrev) continue;
                            [arr[i], arr[k]] = [arr[k], arr[i]];
                            changed = true;
                            break;
                        }
                    }
                    if (!changed) break;
                }
                return arr;
            }

            function courseAccentColor(idx) {
                // First course is always the site highlight green.
                if (idx === 0) return '#588157';
                if (!__courseAccentOrder) __courseAccentOrder = buildCourseAccentOrder(COURSE_ACCENT_PALETTE);
                const i = ((idx % __courseAccentOrder.length) + __courseAccentOrder.length) % __courseAccentOrder.length;
                return __courseAccentOrder[i];
            }

            function getCoursesFromGlobal() {
                if (!Array.isArray(window.courses)) return [];
                const courses = window.courses
                    .filter(course => {
                        if (!course || !course.id || !course.title || course.isArchived) return false;
                        const normalizedTitle = String(course.title).trim().toLowerCase();
                        return normalizedTitle !== 'полезни линкове';
                    })
                    .map(course => ({ id: String(course.id), title: String(course.title) }))
                    .sort((a, b) => a.title.localeCompare(b.title, 'bg'));

                const hasGeneralCourse = courses.some(
                    (course) => String(course.title || '').trim().toLowerCase() === 'общи'
                );

                if (!hasGeneralCourse) {
                    courses.unshift({ id: 'general', title: 'Общи' });
                }

                return courses;
            }

            // Diff-render the course list. Reuses existing <li>/option nodes when the
            // filtered set is unchanged so typing in the search box doesn't flicker
            // or re-attach listeners. A single delegated click handler is attached
            // once below; per-item listeners are no longer wired.
            let coursesListClickDelegated = false;
            function ensureCoursesListDelegation() {
                if (coursesListClickDelegated) return;
                coursesListClickDelegated = true;
                els.coursesList.addEventListener('click', async (event) => {
                    const li = event.target.closest('li.course-item');
                    if (!li || !els.coursesList.contains(li)) return;
                    const courseId = li.dataset.courseId;
                    if (!courseId || courseId === state.selectedCourseId) return;
                    const course = state.courses.find(c => c.id === courseId)
                        || state.filteredCourses.find(c => c.id === courseId);
                    if (!course) return;
                    if (state.isDirty) {
                        const shouldDiscard = confirm('You have unsaved changes. Continue without saving?');
                        if (!shouldDiscard) return;
                    }
                    await selectCourse(course.id, course.title);
                });
            }

            function renderCoursesList() {
                ensureCoursesListDelegation();

                const list = els.coursesList;
                const select = els.courseSelectMobile;

                if (!state.filteredCourses.length) {
                    if (list.children.length !== 1 || list.firstElementChild.className !== 'empty-courses') {
                        list.innerHTML = '';
                        const li = document.createElement('li');
                        li.className = 'empty-courses';
                        li.textContent = 'No courses found.';
                        list.appendChild(li);
                    }
                    if (select.children.length !== 1 || select.firstElementChild.value !== '') {
                        select.innerHTML = '';
                        const option = document.createElement('option');
                        option.value = '';
                        option.textContent = 'No courses found';
                        select.appendChild(option);
                    }
                    return;
                }

                // <ul>: reuse existing nodes keyed by courseId; reorder via appendChild.
                const seenLi = new Set();
                let cursor = null;
                let __accentIdx = 0;
                for (const course of state.filteredCourses) {
                    const __accent = courseAccentColor(__accentIdx++);
                    seenLi.add(course.id);
                    let li = list.querySelector(`:scope > li.course-item[data-course-id="${CSS.escape(course.id)}"]`);
                    const wantClass = 'course-item' + (course.id === state.selectedCourseId ? ' active' : '');
                    if (!li) {
                        li = document.createElement('li');
                        li.className = wantClass;
                        li.textContent = course.title;
                        li.dataset.courseId = course.id;
                        li.style.setProperty('--course-accent', __accent);
                    } else {
                        if (li.textContent !== course.title) li.textContent = course.title;
                    li.style.setProperty('--course-accent', __accent);
                        if (li.className !== wantClass) li.className = wantClass;
                    }
                    const expectedNext = cursor ? cursor.nextElementSibling : list.firstElementChild;
                    if (expectedNext !== li) {
                        if (cursor) cursor.after(li); else list.prepend(li);
                    }
                    cursor = li;
                }
                // Remove leftovers (filtered out by search, or stale empty-courses row).
                const leftovers = [];
                for (const child of list.children) {
                    if (child.className === 'empty-courses' || (child.dataset && !seenLi.has(child.dataset.courseId))) {
                        leftovers.push(child);
                    }
                }
                leftovers.forEach(n => n.remove());

                // <select>: same diff treatment.
                const seenOpt = new Set();
                let optCursor = null;
                for (const course of state.filteredCourses) {
                    seenOpt.add(course.id);
                    let option = select.querySelector(`option[value="${CSS.escape(course.id)}"]`);
                    const wantSelected = course.id === state.selectedCourseId;
                    if (!option) {
                        option = document.createElement('option');
                        option.value = course.id;
                        option.textContent = course.title;
                    } else if (option.textContent !== course.title) {
                        option.textContent = course.title;
                    }
                    if (option.selected !== wantSelected) option.selected = wantSelected;
                    const expectedNext = optCursor ? optCursor.nextElementSibling : select.firstElementChild;
                    if (expectedNext !== option) {
                        if (optCursor) optCursor.after(option); else select.prepend(option);
                    }
                    optCursor = option;
                }
                const optLeftovers = [];
                for (const child of select.children) {
                    if (!seenOpt.has(child.value)) optLeftovers.push(child);
                }
                optLeftovers.forEach(n => n.remove());
            }

            function financeDate(value) {
                if (!value) return '\u2014';
                const date = new Date(value);
                if (Number.isNaN(date.getTime())) return '\u2014';

                const day = String(date.getDate());
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const year = String(date.getFullYear());
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');

                return `${day}.${month}.${year}, ${hours}:${minutes}`;
            }

            function compactFinanceDate(value) {
                if (!value) return '\u2014';
                const date = new Date(value);
                if (Number.isNaN(date.getTime())) return '\u2014';

                const day = String(date.getDate());
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');

                return `${day}.${month}, ${hours}:${minutes}`;
            }

            function isCompactMetaViewport() {
                return window.matchMedia('(max-width: 1000px), (hover: none), (pointer: coarse)').matches;
            }
            function normalizeHtml(html) {
                const text = String(html || '').trim();
                return text ? html : '';
            }

            function unwrapNode(node) {
                const parent = node && node.parentNode;
                if (!parent) return;
                while (node.firstChild) {
                    parent.insertBefore(node.firstChild, node);
                }
                parent.removeChild(node);
            }

            function sanitizeEditorFormatting(root) {
                if (!(root instanceof Element)) return;

                root.querySelectorAll('font').forEach((fontNode) => {
                    unwrapNode(fontNode);
                });

                root.querySelectorAll('span[style]').forEach((spanNode) => {
                    spanNode.removeAttribute('style');
                    if (spanNode.attributes.length === 0) {
                        unwrapNode(spanNode);
                    }
                });
            }

            function setImageUploadStatus(message, isError = false) {
                if (!imageUploadStatus) return;
                imageUploadStatus.textContent = message || '';
                imageUploadStatus.style.color = isError ? '#dc2626' : '#6b7280';
            }

            function getUploadUserName() {
                const user = state.currentUser || {};
                return user.userName || user.displayName || user.userId || 'anonymous';
            }

            function sanitizeUploadFileName(fileName) {
                const normalized = String(fileName || 'image.png').replace(/\s+/g, '-').toLowerCase();
                return normalized.replace(/[^a-z0-9._-]/g, '') || 'image.png';
            }

            function buildCloudflareImagePath(fileName) {
                const now = new Date();
                const year = String(now.getFullYear());
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const timestamp = now.getTime();
                const safeName = sanitizeUploadFileName(fileName);
                return `notes-images/${year}/${month}/${timestamp}-${safeName}`;
            }

            async function uploadImageFileToCloudflare(file, statusPrefix = 'Uploading image') {
                if (!file) throw new Error('No file selected');
                if (!file.type || !file.type.startsWith('image/')) {
                    throw new Error('Selected file is not an image');
                }

                setImageUploadStatus(`${statusPrefix}...`);

                const formData = new FormData();
                formData.append('file', file);
                formData.append('path', buildCloudflareImagePath(file.name));
                formData.append('userName', getUploadUserName());

                const response = await fetch(NOTES_R2_WORKER_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Upload failed');
                }

                const data = await response.json();
                if (!data || !data.url) {
                    throw new Error('Upload succeeded but no URL was returned');
                }

                setImageUploadStatus('Upload complete. URL is ready.');
                return data.url;
            }

            function plainTextToHtml(text) {
                const safe = String(text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;')
                    .replace(/\n/g, '<br>');
                return safe;
            }

            function escapeHtml(text) {
                return String(text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function htmlToPlainText(html) {
                const temp = document.createElement('div');
                temp.innerHTML = String(html || '');
                return (temp.innerText || '').replace(/\r/g, '').trim();
            }

            function extractLocalContribution(baseText, localText) {
                const base = String(baseText || '');
                const local = String(localText || '');
                if (!local.trim()) return '';
                if (!base.trim()) return local.trim();

                const max = Math.min(base.length, local.length);
                let index = 0;
                while (index < max && base[index] === local[index]) {
                    index += 1;
                }

                const tail = local.slice(index).trim();
                return tail || local.trim();
            }

            function mergeConcurrentHtml(currentHtml, baseHtml, localHtml, authorName) {
                const currentNormalized = normalizeHtml(currentHtml);
                const baseText = htmlToPlainText(baseHtml);
                const localText = htmlToPlainText(localHtml);
                const contribution = extractLocalContribution(baseText, localText);
                if (!contribution) return currentNormalized;

                const safeAuthor = escapeHtml(authorName || 'Unknown');
                const safeContribution = escapeHtml(contribution).replace(/\n/g, '<br>');
                const mergedBlock = `
<p><br></p>
<div data-author="${safeAuthor}" title="Author: ${safeAuthor}">${safeContribution}</div>`;

                return `${currentNormalized}${mergedBlock}`;
            }

            function getEditorHtml() {
                const clone = els.courseNotesEditor.cloneNode(true);
                clone.querySelectorAll('img').forEach((img) => {
                    const dataSrc = img.getAttribute('data-src');
                    if (dataSrc) {
                        img.setAttribute('src', dataSrc);
                    }
                    img.removeAttribute('data-src');
                    img.removeAttribute('data-lazy-loaded');
                    img.classList.remove('notes-lazy-image');
                    img.classList.remove('notes-image-loaded');
                });
                sanitizeEditorFormatting(clone);
                return normalizeHtml(clone.innerHTML);
            }

            function setEditorHtml(html) {
                const value = normalizeHtml(html);
                els.courseNotesEditor.innerHTML = value;
                sanitizeEditorFormatting(els.courseNotesEditor);
                setupLazyLoadingForEditorImages();
            }

            function setupLazyObserver() {
                if (state.imageObserver) return;
                if (typeof IntersectionObserver === 'undefined') return;

                state.imageObserver = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (!entry.isIntersecting) return;
                        const img = entry.target;
                        if (!(img instanceof HTMLImageElement)) return;

                        const dataSrc = img.getAttribute('data-src');
                        if (!dataSrc) {
                            state.imageObserver.unobserve(img);
                            return;
                        }

                        img.src = dataSrc;
                        img.removeAttribute('data-src');
                        img.setAttribute('data-lazy-loaded', '1');
                        img.classList.remove('notes-lazy-image');
                        img.classList.add('notes-image-loaded');
                        state.imageObserver.unobserve(img);
                    });
                }, {
                    root: els.courseNotesEditor,
                    rootMargin: '100px',
                    threshold: 0.01
                });
            }

            function isCloudflareManagedImageUrl(url) {
                const value = String(url || '').trim().toLowerCase();
                if (!value) return false;
                if (value.startsWith('data:image/')) return false;
                return value.includes('coursebook.lol')
                    || value.includes('r2.dev')
                    || value.includes('cloudflare');
            }

            function isNotesBucketImageUrl(url) {
                const value = String(url || '').trim();
                if (!value || value.startsWith('data:image/')) return false;
                const lower = value.toLowerCase();
                if (!lower.includes('notes-images/')) return false;
                return lower.includes('files.coursebook.lol') ||
                    lower.includes('r2.dev') ||
                    lower.includes('cloudflare');
            }

            function normalizeImageReference(url) {
                const value = String(url || '').trim();
                if (!value) return '';
                try {
                    const parsed = new URL(value, window.location.href);
                    parsed.hash = '';
                    parsed.search = '';
                    return parsed.href;
                } catch (_) {
                    return value.replace(/[?#].*$/, '');
                }
            }

            function extractNotesBucketImageUrls(html) {
                const root = document.createElement('div');
                root.innerHTML = String(html || '');
                const urls = new Set();
                root.querySelectorAll('img').forEach((img) => {
                    [img.getAttribute('src'), img.getAttribute('data-src')]
                        .filter(Boolean)
                        .forEach((src) => {
                            if (isNotesBucketImageUrl(src)) {
                                urls.add(normalizeImageReference(src));
                            }
                        });
                });
                return urls;
            }

            function getPendingImageDeletionStorageKey(courseId) {
                return `courseNotesPendingImageDeletes:${courseId || 'unknown'}`;
            }

            function loadPendingImageDeletions(courseId) {
                try {
                    const raw = localStorage.getItem(getPendingImageDeletionStorageKey(courseId));
                    const parsed = raw ? JSON.parse(raw) : [];
                    return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
                } catch (_) {
                    return [];
                }
            }

            function savePendingImageDeletions(courseId, urls) {
                const unique = Array.from(new Set((urls || []).filter(Boolean)));
                try {
                    if (unique.length) {
                        localStorage.setItem(getPendingImageDeletionStorageKey(courseId), JSON.stringify(unique));
                    } else {
                        localStorage.removeItem(getPendingImageDeletionStorageKey(courseId));
                    }
                } catch (error) {
                    console.warn('Could not save pending note image deletion queue:', error);
                }
            }

            function queueRemovedNoteImages(courseId, previousHtml, nextHtml) {
                if (!courseId) return [];
                const previousUrls = extractNotesBucketImageUrls(previousHtml);
                if (!previousUrls.size) return [];

                const nextUrls = extractNotesBucketImageUrls(nextHtml);
                const removed = Array.from(previousUrls).filter((url) => !nextUrls.has(url));
                if (!removed.length) return [];

                const pending = loadPendingImageDeletions(courseId);
                const merged = Array.from(new Set(pending.concat(removed)));
                savePendingImageDeletions(courseId, merged);
                return removed;
            }

            function deriveDefaultBucketKeyFromUrl(url) {
                const value = String(url || '').trim();
                if (!value) return '';
                try {
                    const parsed = new URL(value, window.location.href);
                    const host = parsed.hostname.toLowerCase();
                    if (!host.includes('files.coursebook.lol') && !host.includes('r2.dev') && !host.includes('cloudflare')) {
                        return '';
                    }
                    return decodeURIComponent(parsed.pathname.replace(/^\/+/, ''));
                } catch (_) {
                    return '';
                }
            }

            async function deleteCloudflareNotesImage(url) {
                const key = deriveDefaultBucketKeyFromUrl(url);
                if (!key || !key.toLowerCase().includes('notes-images/')) return false;

                const response = await fetch(NOTES_R2_WORKER_URL, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, bucketType: 'default' })
                });

                if (!response.ok) {
                    throw new Error(`Cloudflare delete failed (${response.status})`);
                }
                return true;
            }

            async function loadHistoryEntriesForImageDeletion(courseId) {
                const histRef = firebase.database().ref(`${COURSE_NOTE_HISTORY_ROOT}/${courseId}`);
                const snap = await histRef.once('value');
                const entries = [];
                snap.forEach(child => { entries.push({ id: child.key, ...child.val() }); });
                entries.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
                return entries.slice(0, HISTORY_MAX_ENTRIES);
            }

            async function cleanupPendingDeletedNoteImages(courseId, currentHtml) {
                if (!courseId) return;
                const pending = loadPendingImageDeletions(courseId);
                if (!pending.length) return;

                const currentUrls = extractNotesBucketImageUrls(currentHtml);
                let historyEntries = [];
                try {
                    historyEntries = await loadHistoryEntriesForImageDeletion(courseId);
                } catch (error) {
                    console.error('Skipping note image cleanup because history could not be verified:', error);
                    return;
                }
                const protectedUrls = new Set(currentUrls);
                historyEntries.forEach((entry) => {
                    extractNotesBucketImageUrls(entry.html || '').forEach((url) => protectedUrls.add(url));
                });

                const stillPending = [];
                for (const url of pending) {
                    if (protectedUrls.has(url)) {
                        stillPending.push(url);
                        continue;
                    }

                    try {
                        await deleteCloudflareNotesImage(url);
                    } catch (error) {
                        console.error('Failed to delete unused note image from Cloudflare:', error);
                        stillPending.push(url);
                    }
                }

                savePendingImageDeletions(courseId, stillPending);
            }

            function removeBrokenCloudflareImage(img) {
                if (!(img instanceof HTMLImageElement)) return;
                if (!els.courseNotesEditor.contains(img)) return;

                const originalSrc = img.getAttribute('data-src') || img.getAttribute('src') || '';
                if (!isCloudflareManagedImageUrl(originalSrc)) return;

                const parent = img.parentElement;
                img.remove();

                if (parent && (parent.tagName === 'P' || parent.tagName === 'DIV')) {
                    const text = (parent.textContent || '').trim();
                    const hasMedia = parent.querySelector('img,video,audio,iframe');
                    if (!text && !hasMedia) {
                        parent.remove();
                    }
                }

                markEditedBlockAuthor();
                bumpLocalEditVersion();
                setDraftState(true);
                scheduleAutosave();
                scheduleLiveblocksDocBroadcast();
                scheduleRealtimePresenceFlush(true);
            }

            function setupLazyLoadingForEditorImages() {
                const images = Array.from(els.courseNotesEditor.querySelectorAll('img'));
                images.forEach((img) => {
                    img.loading = 'lazy';
                    img.decoding = 'async';
                    img.referrerPolicy = 'no-referrer';
                    img.setAttribute('draggable', 'false');

                    if (img.dataset.notesErrorBound !== '1') {
                        img.addEventListener('error', () => {
                            removeBrokenCloudflareImage(img);
                        });
                        img.dataset.notesErrorBound = '1';
                    }

                    const dataSrc = img.getAttribute('data-src');
                    if (dataSrc) {
                        img.setAttribute('src', dataSrc);
                        img.removeAttribute('data-src');
                    }

                    img.setAttribute('data-lazy-loaded', '1');
                    img.classList.remove('notes-lazy-image');
                    img.classList.add('notes-image-loaded');
                });
            }

            function rememberImageInsertRange() {
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) {
                    state.savedImageRange = null;
                    return;
                }
                const range = selection.getRangeAt(0);
                if (!els.courseNotesEditor.contains(range.startContainer) || !els.courseNotesEditor.contains(range.endContainer)) {
                    state.savedImageRange = null;
                    return;
                }
                state.savedImageRange = range.cloneRange();
            }

            function getImageInsertRange() {
                if (state.savedImageRange) return state.savedImageRange;

                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) return null;
                const range = selection.getRangeAt(0);
                if (!els.courseNotesEditor.contains(range.startContainer) || !els.courseNotesEditor.contains(range.endContainer)) {
                    return null;
                }
                return range;
            }

            function closeImageModal() {
                if (!imageModal) return;
                imageModal.style.display = 'none';
                if (imageUploadFileInput) imageUploadFileInput.value = '';
                if (imageUploadFileName) imageUploadFileName.textContent = '';
                setImageUploadStatus('');

            function openImageModal() {

                if (!imageModal) return;

                setImageUploadStatus('');
