            function financeDate(value) {
                if (!value) return '\u2014';
                const date = new Date(value);
                if (Number.isNaN(date.getTime())) return '\u2014';

                const day = String(date.getDate());
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const year = String(date.getFullYear());
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');

                return `${day}.${month}.${year}, ${hours}:${minutes}`;
            }

            function compactFinanceDate(value) {
                if (!value) return '\u2014';
                const date = new Date(value);
                if (Number.isNaN(date.getTime())) return '\u2014';

                const day = String(date.getDate());
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');

                return `${day}.${month}, ${hours}:${minutes}`;
            }

            function isCompactMetaViewport() {
                return window.matchMedia('(max-width: 1000px), (hover: none), (pointer: coarse)').matches;
            }
            function normalizeHtml(html) {
                const text = String(html || '').trim();
                return text ? html : '';
            }

            function unwrapNode(node) {
                const parent = node && node.parentNode;
                if (!parent) return;
                while (node.firstChild) {
                    parent.insertBefore(node.firstChild, node);
                }
                parent.removeChild(node);
            }

            function sanitizeEditorFormatting(root) {
                if (!(root instanceof Element)) return;

                root.querySelectorAll('font').forEach((fontNode) => {
                    unwrapNode(fontNode);
                });

                root.querySelectorAll('span[style]').forEach((spanNode) => {
                    spanNode.removeAttribute('style');
                    if (spanNode.attributes.length === 0) {
                        unwrapNode(spanNode);
                    }
                });
            }

            function setImageUploadStatus(message, isError = false) {
                if (!imageUploadStatus) return;
                imageUploadStatus.textContent = message || '';
                imageUploadStatus.style.color = isError ? '#dc2626' : '#6b7280';
            }

            function getUploadUserName() {
                const user = state.currentUser || {};
                return user.userName || user.displayName || user.userId || 'anonymous';
            }

            function sanitizeUploadFileName(fileName) {
                const normalized = String(fileName || 'image.png').replace(/\s+/g, '-').toLowerCase();
                return normalized.replace(/[^a-z0-9._-]/g, '') || 'image.png';
            }

            function buildCloudflareImagePath(fileName) {
                const now = new Date();
                const year = String(now.getFullYear());
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const timestamp = now.getTime();
                const safeName = sanitizeUploadFileName(fileName);
                return `notes-images/${year}/${month}/${timestamp}-${safeName}`;
            }

            async function uploadImageFileToCloudflare(file, statusPrefix = 'Uploading image') {
                if (!file) throw new Error('No file selected');
                if (!file.type || !file.type.startsWith('image/')) {
                    throw new Error('Selected file is not an image');
                }

                setImageUploadStatus(`${statusPrefix}...`);

                const formData = new FormData();
                formData.append('file', file);
                formData.append('path', buildCloudflareImagePath(file.name));
                formData.append('userName', getUploadUserName());

                const response = await fetch(NOTES_R2_WORKER_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Upload failed');
                }

                const data = await response.json();
                if (!data || !data.url) {
                    throw new Error('Upload succeeded but no URL was returned');
                }

                setImageUploadStatus('Upload complete. URL is ready.');
                return data.url;
            }

            function plainTextToHtml(text) {
                const safe = String(text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;')
                    .replace(/\n/g, '<br>');
                return safe;
            }

            function escapeHtml(text) {
                return String(text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function htmlToPlainText(html) {
                const temp = document.createElement('div');
                temp.innerHTML = String(html || '');
                return (temp.innerText || '').replace(/\r/g, '').trim();
            }

            function extractLocalContribution(baseText, localText) {
                const base = String(baseText || '');
                const local = String(localText || '');
                if (!local.trim()) return '';
                if (!base.trim()) return local.trim();

                const max = Math.min(base.length, local.length);
                let index = 0;
                while (index < max && base[index] === local[index]) {
                    index += 1;
                }

                const tail = local.slice(index).trim();
                return tail || local.trim();
            }

            function mergeConcurrentHtml(currentHtml, baseHtml, localHtml, authorName) {
                const currentNormalized = normalizeHtml(currentHtml);
                const baseText = htmlToPlainText(baseHtml);
                const localText = htmlToPlainText(localHtml);
                const contribution = extractLocalContribution(baseText, localText);
                if (!contribution) return currentNormalized;

                const safeAuthor = escapeHtml(authorName || 'Unknown');
                const safeContribution = escapeHtml(contribution).replace(/\n/g, '<br>');
                const mergedBlock = `
<p><br></p>
<div data-author="${safeAuthor}" title="Author: ${safeAuthor}">${safeContribution}</div>`;

                return `${currentNormalized}${mergedBlock}`;
            }

            function getEditorHtml() {
                const clone = els.courseNotesEditor.cloneNode(true);
                clone.querySelectorAll('img').forEach((img) => {
                    const dataSrc = img.getAttribute('data-src');
                    if (dataSrc) {
                        img.setAttribute('src', dataSrc);
                    }
                    img.removeAttribute('data-src');
                    img.removeAttribute('data-lazy-loaded');
                    img.classList.remove('notes-lazy-image');
                    img.classList.remove('notes-image-loaded');
                });
                sanitizeEditorFormatting(clone);
                return normalizeHtml(clone.innerHTML);
            }

            function setEditorHtml(html) {
                const value = normalizeHtml(html);
                els.courseNotesEditor.innerHTML = value;
                sanitizeEditorFormatting(els.courseNotesEditor);
                setupLazyLoadingForEditorImages();
            }

            function setupLazyObserver() {
                if (state.imageObserver) return;
                if (typeof IntersectionObserver === 'undefined') return;

                state.imageObserver = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (!entry.isIntersecting) return;
                        const img = entry.target;
                        if (!(img instanceof HTMLImageElement)) return;

                        const dataSrc = img.getAttribute('data-src');
                        if (!dataSrc) {
                            state.imageObserver.unobserve(img);
                            return;
                        }

                        img.src = dataSrc;
                        img.removeAttribute('data-src');
                        img.setAttribute('data-lazy-loaded', '1');
                        img.classList.remove('notes-lazy-image');
                        img.classList.add('notes-image-loaded');
                        state.imageObserver.unobserve(img);
                    });
                }, {
                    root: els.courseNotesEditor,
                    rootMargin: '100px',
                    threshold: 0.01
                });
            }

            function isCloudflareManagedImageUrl(url) {
                const value = String(url || '').trim().toLowerCase();
                if (!value) return false;
                if (value.startsWith('data:image/')) return false;
                return value.includes('coursebook.lol')
                    || value.includes('r2.dev')
                    || value.includes('cloudflare');
            }

            function removeBrokenCloudflareImage(img) {
                if (!(img instanceof HTMLImageElement)) return;
                if (!els.courseNotesEditor.contains(img)) return;

                const originalSrc = img.getAttribute('data-src') || img.getAttribute('src') || '';
                if (!isCloudflareManagedImageUrl(originalSrc)) return;

                const parent = img.parentElement;
                img.remove();

                if (parent && (parent.tagName === 'P' || parent.tagName === 'DIV')) {
                    const text = (parent.textContent || '').trim();
                    const hasMedia = parent.querySelector('img,video,audio,iframe');
                    if (!text && !hasMedia) {
                        parent.remove();
                    }
                }

                markEditedBlockAuthor();
                bumpLocalEditVersion();
                setDraftState(true);
                scheduleAutosave();
                scheduleLiveblocksDocBroadcast();
                scheduleRealtimePresenceFlush(true);
            }

            function setupLazyLoadingForEditorImages() {
                const images = Array.from(els.courseNotesEditor.querySelectorAll('img'));
                images.forEach((img) => {
                    img.loading = 'lazy';
                    img.decoding = 'async';
                    img.referrerPolicy = 'no-referrer';
                    img.setAttribute('draggable', 'false');

                    if (img.dataset.notesErrorBound !== '1') {
                        img.addEventListener('error', () => {
                            removeBrokenCloudflareImage(img);
                        });
                        img.dataset.notesErrorBound = '1';
                    }

                    const dataSrc = img.getAttribute('data-src');
                    if (dataSrc) {
                        img.setAttribute('src', dataSrc);
                        img.removeAttribute('data-src');
                    }

                    img.setAttribute('data-lazy-loaded', '1');
                    img.classList.remove('notes-lazy-image');
                    img.classList.add('notes-image-loaded');
                });
            }

            function rememberImageInsertRange() {
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) {
                    state.savedImageRange = null;
                    return;
                }
                const range = selection.getRangeAt(0);
                if (!els.courseNotesEditor.contains(range.startContainer) || !els.courseNotesEditor.contains(range.endContainer)) {
                    state.savedImageRange = null;
                    return;
                }
                state.savedImageRange = range.cloneRange();
            }

            function getImageInsertRange() {
                if (state.savedImageRange) return state.savedImageRange;

                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) return null;
                const range = selection.getRangeAt(0);
                if (!els.courseNotesEditor.contains(range.startContainer) || !els.courseNotesEditor.contains(range.endContainer)) {
                    return null;
                }
                return range;
            }

            function closeImageModal() {
                if (!imageModal) return;
                imageModal.style.display = 'none';
                if (imageUploadFileInput) imageUploadFileInput.value = '';
                if (imageUploadFileName) imageUploadFileName.textContent = '';
                setImageUploadStatus('');
            }

            function openImageModal() {
                rememberImageInsertRange();
                if (!imageModal) return;
                imageModal.style.display = 'flex';
                if (imageUrlInput) imageUrlInput.focus();
                setImageUploadStatus('');
            }

            function insertImageAtSelection(src) {
                const imageSrc = String(src || '').trim();
                if (!imageSrc) return false;

                const range = getImageInsertRange();
                if (!range) {
                    alert('Click in the editor before inserting an image.');
                    return false;
                }

                els.courseNotesEditor.focus();

                const image = document.createElement('img');
                image.src = imageSrc;
                image.alt = 'Image';
                image.loading = 'lazy';
                image.decoding = 'async';
                image.referrerPolicy = 'no-referrer';
                image.classList.add('notes-image-loaded');
                image.setAttribute('data-lazy-loaded', '1');
                image.setAttribute('draggable', 'false');

                range.deleteContents();
                range.insertNode(image);

                const paragraph = document.createElement('p');
                paragraph.innerHTML = '<br>';
                image.parentNode.insertBefore(paragraph, image.nextSibling);

                const newRange = document.createRange();
                newRange.setStart(paragraph, 0);
                newRange.collapse(true);

                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(newRange);
                state.savedImageRange = newRange.cloneRange();

                setupLazyLoadingForEditorImages();

                markEditedBlockAuthor();
                bumpLocalEditVersion();
                setDraftState(true);
                scheduleAutosave();
                scheduleLiveblocksDocBroadcast();
                scheduleRealtimePresenceFlush(true);
                return true;
            }

            function getCurrentNoteRef() {
                if (!state.selectedCourseId) return null;
                return firebase.database().ref(`${COURSE_NOTE_ROOT}/${state.selectedCourseId}`);
            }

            function renderCurrentMeta(value) {
                state.currentMetaValue = value || {};
                const updatedBy = value?.updatedBy || 'Unknown';
                const compact = isCompactMetaViewport();
                const updatedAt = compact ? compactFinanceDate(value?.updatedAt) : financeDate(value?.updatedAt);

                if (compact) {
                    els.selectedCourseMeta.textContent = `${updatedAt}${updatedAt === '\u2014' ? '' : ` \u00b7 ${updatedBy}`}`;
                    return;
                }

                els.selectedCourseMeta.textContent = `Last edit: ${updatedAt}${updatedAt === '\u2014' ? '' : ` \u00b7 ${updatedBy}`}`;
            }
            function normalizeAuthorTitles() {
                const authoredNodes = els.courseNotesEditor.querySelectorAll('[data-author]');
                authoredNodes.forEach(node => {
                    const author = node.getAttribute('data-author') || 'Unknown';
                    node.setAttribute('title', `Author: ${author}`);
                });
            }

            function getCurrentSelectionBlock() {
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) return null;

                let node = selection.anchorNode;
                if (!node) return null;
                if (node.nodeType === Node.TEXT_NODE) {
                    node = node.parentElement;
                }

                if (!(node instanceof Element)) return null;
                if (!els.courseNotesEditor.contains(node)) return null;
                const block = node.closest('p,div,h1,h2,h3,li,blockquote');
                if (block && els.courseNotesEditor.contains(block)) return block;
                return els.courseNotesEditor;
            }

            function markEditedBlockAuthor() {
                const block = getCurrentSelectionBlock();
                if (!block || block === els.courseNotesEditor) return;
                const authorName = state.currentUser?.displayName || state.currentUser?.userName || state.currentUser?.userId || 'Unknown';
                block.setAttribute('data-author', authorName);
                block.setAttribute('data-author-id', state.currentUser?.userId || 'unknown');
                block.setAttribute('title', `Author: ${authorName}`);
            }

            function stopCurrentSubscription() {
                clearAutosaveTimer();
                if (state.currentNoteRef && state.noteListener) {
                    state.currentNoteRef.off('value', state.noteListener);
                }
                stopLiveblocksPresence();
                state.currentNoteRef = null;
                state.noteListener = null;
                state.hasLoadedCurrentNote = false;
            }

            async function subscribeCurrentNote() {
                stopCurrentSubscription();

                const ref = getCurrentNoteRef();
                if (!ref) return;

                state.currentNoteRef = ref;

                try {
                    const snapshot = await ref.get();
                    const value = snapshot.val() || {};
                    const noteHtml = typeof value.html === 'string'
                        ? value.html
                        : plainTextToHtml(typeof value.text === 'string' ? value.text : '');

                    if (!state.isDirty || !state.hasLoadedCurrentNote) {
                        setEditorHtml(noteHtml);
                        normalizeAuthorTitles();
                        state.lastSavedHtml = normalizeHtml(noteHtml);
                        setDraftState(false);
                    }

                    renderCurrentMeta(value);
                    state.hasLoadedCurrentNote = true;
                } catch (error) {
                    console.error('Failed loading course note:', error);
                }

                startLiveblocksPresence();
            }

            async function saveCurrentCourseNote(isAutoSave = false) {
                if (state.isSaving) return;

                const ref = getCurrentNoteRef();
                if (!ref) return;

                const html = getEditorHtml();
                const normalizedHtmlAtStart = normalizeHtml(html);
                const localEditVersionAtStart = state.localEditVersion;
                if (html === state.lastSavedHtml) {
                    setDraftState(false);
                    return;
                }

                state.isSaving = true;

                try {
                    const user = state.currentUser || await window.currentUserPromise;
                    const updatedBy = user?.displayName || user?.userName || user?.userId || 'Unknown';
                    const baseHtml = state.lastSavedHtml;

                    const txResult = await ref.transaction((currentValue) => {
                        const currentHtml = typeof currentValue?.html === 'string'
                            ? currentValue.html
                            : plainTextToHtml(typeof currentValue?.text === 'string' ? currentValue.text : '');

                        const currentNormalized = normalizeHtml(currentHtml);
                        const localNormalized = normalizeHtml(html);
                        const baseNormalized = normalizeHtml(baseHtml);

                        let finalHtml = localNormalized;
                        if (currentNormalized && currentNormalized !== baseNormalized && currentNormalized !== localNormalized) {
                            finalHtml = mergeConcurrentHtml(currentNormalized, baseNormalized, localNormalized, updatedBy);
                        }

                        return {
                            html: finalHtml,
                            text: htmlToPlainText(finalHtml),
                            updatedAt: firebase.database.ServerValue.TIMESTAMP,
                            updatedBy
                        };
                    });

                    const savedValue = txResult?.snapshot?.val() || {};
                    const savedHtml = typeof savedValue.html === 'string'
                        ? savedValue.html
                        : plainTextToHtml(typeof savedValue.text === 'string' ? savedValue.text : '');

                    state.lastSavedHtml = normalizeHtml(savedHtml);

                    const currentEditorHtml = normalizeHtml(getEditorHtml());
                    const editedDuringSave =
                        state.localEditVersion !== localEditVersionAtStart ||
                        currentEditorHtml !== normalizedHtmlAtStart;

                    if (editedDuringSave) {
                        const stillDirty = currentEditorHtml !== state.lastSavedHtml;
                        setDraftState(stillDirty);
                        if (stillDirty) {
                            scheduleAutosave();
                        }
                        return;
                    }

                    if (state.lastSavedHtml !== currentEditorHtml) {
                        setEditorHtml(state.lastSavedHtml);
                        normalizeAuthorTitles();
                    }

                    setDraftState(false);
                } catch (error) {
                    console.error('Failed saving course note:', error);
                    setDraftState(true);
                } finally {
                    state.isSaving = false;
                }
            }

            function scheduleAutosave() {
                clearAutosaveTimer();
                state.autosaveTimer = setTimeout(() => {
                    if (state.isDirty) {
                        saveCurrentCourseNote(true);
                    }
                }, AUTOSAVE_DELAY_MS);
            }

            function toggleHeading(tagName) {
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) return;
                const range = selection.getRangeAt(0);
                let node = range.startContainer;
                if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
                if (!(node instanceof Element) || !els.courseNotesEditor.contains(node)) return;

                const currentHeading = node.closest('h1,h2,h3,h4');
                if (currentHeading && currentHeading.tagName.toLowerCase() === tagName.toLowerCase()) {
                    document.execCommand('formatBlock', false, 'p');
                } else {
                    document.execCommand('formatBlock', false, tagName.toLowerCase());
                }
            }

            function toggleLink() {
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return;

                let node = selection.anchorNode;
                if (node && node.nodeType === Node.TEXT_NODE) node = node.parentElement;
                if (node instanceof Element) {
                    const existingAnchor = node.closest('a');
                    if (existingAnchor && els.courseNotesEditor.contains(existingAnchor)) {
                        document.execCommand('unlink', false);
                        return;
                    }
                }

                const url = prompt('Enter a link (https://...)');
                if (!url) return;
                const normalizedUrl = /^(https?:\/\/)/i.test(url) ? url : `https://${url}`;
                document.execCommand('createLink', false, normalizedUrl);
            }

            function applyCommand(action) {
                els.courseNotesEditor.focus();
                if (action === 'h1') {
                    toggleHeading('h1');
                } else if (action === 'h2') {
                    toggleHeading('h2');
                } else if (action === 'h3') {
                    toggleHeading('h3');
                } else if (action === 'h4') {
                    toggleHeading('h4');
                } else if (action === 'bold') {
                    document.execCommand('bold', false);
                } else if (action === 'italic') {
                    document.execCommand('italic', false);
                } else if (action === 'underline') {
                    document.execCommand('underline', false);
                } else if (action === 'bullet') {
                    document.execCommand('insertUnorderedList', false);
                } else if (action === 'indent') {
                    document.execCommand('indent', false);
                } else if (action === 'outdent') {
                    document.execCommand('outdent', false);
                } else if (action === 'image') {
                    openImageModal();
                    return;
                } else if (action === 'symbols') {
                    symbolsModal.style.display = 'flex';
                    return;
                } else if (action === 'link') {
                    toggleLink();
                } else if (action === 'separator') {
                    document.execCommand('insertHTML', false, '<hr style="border:none;border-top:1px solid #d1d5db;margin:8px 0;">');
                }
                markEditedBlockAuthor();
                bumpLocalEditVersion();
                setDraftState(true);
                scheduleAutosave();
            }

            function isSelectionInsideListItem() {
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) return false;
                let node = selection.anchorNode;
                if (!node) return false;
                if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
                if (!(node instanceof Element)) return false;
                if (!els.courseNotesEditor.contains(node)) return false;
                return !!node.closest('li');
            }

            function applySearchFilter() {
                const term = (els.courseSearch.value || '').trim().toLowerCase();
                if (!term) {
                    state.filteredCourses = [...state.courses];
                } else {
                    state.filteredCourses = state.courses.filter(course =>
                        course.title.toLowerCase().includes(term)
                    );
                }
                renderCoursesList();
            }

            async function selectCourse(courseId, courseTitle) {
                state.selectedCourseId = courseId;
                els.selectedCourseTitle.textContent = courseTitle;
                if (els.courseSelectMobile.value !== courseId) {
                    els.courseSelectMobile.value = courseId;
                }

                setDraftState(false);
                await subscribeCurrentNote();

                renderCoursesList();
            }

            async function init() {
                placeNotesStatusForViewport();

                const adminButton = document.getElementById('admin-button');
                if (adminButton) {
                    const isAdminByRole = (candidate) => {
                        return Boolean(candidate && (candidate.isAdmin || String(candidate.role || '').toLowerCase() === 'admin'));
                    };

                    try {
                        const cachedRaw = localStorage.getItem('loggedInUser');
                        if (cachedRaw) {
                            const cachedUser = JSON.parse(cachedRaw);
                            if (isAdminByRole(cachedUser)) {
                                adminButton.style.display = 'list-item';
                            }
                        }
                    } catch (_) {
                        // Ignore malformed cache and continue with async check.
                    }

                    if (window.currentUserPromise) {
                        window.currentUserPromise.then(user => {
                            adminButton.style.display = isAdminByRole(user) ? 'list-item' : 'none';
                        }).catch(error => {
                            console.error('Error checking admin status:', error);
                        });
                    }
                }

                els.courseNotesEditor.contentEditable = 'true';

                try {
                    state.currentUser = await window.currentUserPromise;
                } catch (error) {
                    console.error('Error loading current user:', error);
                }
                startCollabProfileListener();

                state.courses = getCoursesFromGlobal();
                state.filteredCourses = [...state.courses];
                renderCoursesList();

                if (!state.liveblocksEnabled) {
                    setCollabSimpleStatus('Offline');
                }

                if (state.courses.length > 0) {
                    const preferredCourse =
                        state.courses.find((course) => /\bобщи\b/i.test(course.title)) ||
                        state.courses.find((course) => /общи/i.test(course.title)) ||
                        state.courses.find((course) => /\bобща\b/i.test(course.title)) ||
                        state.courses.find((course) => /обща/i.test(course.title)) ||
                        state.courses[0];

                    await selectCourse(preferredCourse.id, preferredCourse.title);
                } else {
                    els.selectedCourseTitle.textContent = 'No courses available';
                    els.courseNotesEditor.contentEditable = 'false';
                    els.notesStatus.textContent = 'No courses available';
                    els.notesStatus.classList.add('error');
                }
            }

            els.courseSearch.addEventListener('input', applySearchFilter);

            els.courseSelectMobile.addEventListener('change', async (event) => {
                const courseId = event.target.value;
                if (!courseId) return;
                const course = state.courses.find(item => item.id === courseId) || state.filteredCourses.find(item => item.id === courseId);
                if (!course) return;

                if (state.isDirty && courseId !== state.selectedCourseId) {
                    const shouldDiscard = confirm('You have unsaved changes. Continue without saving?');
                    if (!shouldDiscard) {
                        event.target.value = state.selectedCourseId || '';
                        return;
                    }
                }

                await selectCourse(course.id, course.title);
            });

            els.courseNotesEditor.addEventListener('input', () => {
                normalizeSeparatorLines();
                sanitizeEditorFormatting(els.courseNotesEditor);
                setupLazyLoadingForEditorImages();
                markEditedBlockAuthor();
                bumpLocalEditVersion();
                setDraftState(true);
                scheduleAutosave();
                scheduleLiveblocksDocBroadcast();
                scheduleRealtimePresenceFlush(true);
            });

            els.courseNotesEditor.addEventListener('paste', async (event) => {
                const clipboardItems = Array.from((event.clipboardData && event.clipboardData.items) || []);
                const imageItem = clipboardItems.find((item) => item.kind === 'file' && item.type && item.type.startsWith('image/'));
                if (!imageItem) return;

                event.preventDefault();

                const file = imageItem.getAsFile();
                if (!file) return;

                rememberImageInsertRange();

                const previousStatus = els.notesStatus ? els.notesStatus.textContent : '';
                if (els.notesStatus) {
                    els.notesStatus.textContent = 'Uploading pasted image...';
                    els.notesStatus.classList.remove('error');
                }

                try {
                    const uploadedUrl = await uploadImageFileToCloudflare(file, 'Uploading pasted image');
                    insertImageAtSelection(uploadedUrl);
                } catch (error) {
                    console.error('Pasted image upload failed:', error);
                    if (els.notesStatus) {
                        els.notesStatus.textContent = 'Image upload failed: ' + (error && error.message ? error.message : 'unknown error');
                        els.notesStatus.classList.add('error');
                    }
                } finally {
                    if (els.notesStatus && !state.isDirty) {
                        els.notesStatus.textContent = previousStatus || 'Saved';
                    }
                }
            });

            els.courseNotesEditor.addEventListener('mouseup', rememberImageInsertRange);
            els.courseNotesEditor.addEventListener('keyup', rememberImageInsertRange);

            els.courseNotesEditor.addEventListener('focus', () => {
                state.isEditorFocused = true;
                scheduleRealtimePresenceFlush(false);
            });

            els.courseNotesEditor.addEventListener('blur', () => {
                state.isEditorFocused = false;
                state.localIsTyping = false;
                state.liveblocksRoom?.updatePresence(buildLiveblocksPresencePayload({ typing: false, selection: null }));
            });

            els.courseNotesEditor.addEventListener('scroll', () => {
                renderLiveblocksOthers(state.liveblocksOthers || [], true);
            });

            window.addEventListener('resize', () => {
                renderLiveblocksOthers(state.liveblocksOthers || [], true);
            });

            document.addEventListener('selectionchange', () => {
                if (!state.selectedCourseId) return;
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) return;
                const range = selection.getRangeAt(0);
                if (!els.courseNotesEditor.contains(range.startContainer) || !els.courseNotesEditor.contains(range.endContainer)) return;
                state.isEditorFocused = true;
                scheduleRealtimePresenceFlush(false);
            });

            els.courseNotesEditor.addEventListener('click', (event) => {
                const link = event.target instanceof Element ? event.target.closest('a') : null;
                if (!link) return;

                const href = link.getAttribute('href') || '';
                if (!href) return;

                event.preventDefault();
                window.open(href, '_blank', 'noopener,noreferrer');
            });

            els.courseNotesEditor.addEventListener('keydown', (event) => {
                if (event.key !== 'Tab') return;
                if (!isSelectionInsideListItem()) return;

                event.preventDefault();
                document.execCommand(event.shiftKey ? 'outdent' : 'indent', false);
                markEditedBlockAuthor();
                bumpLocalEditVersion();
                setDraftState(true);
                scheduleAutosave();
            });

            els.mdButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    applyCommand(btn.dataset.cmd);
                });
            });

            if (closeSymbolsModalBtn) {
                closeSymbolsModalBtn.addEventListener('click', () => {
                    symbolsModal.style.display = 'none';
                });
            }

            if (closeImageModalBtn) {
                closeImageModalBtn.addEventListener('click', () => {
                    closeImageModal();
                });
            }

            if (cancelImageBtn) {
                cancelImageBtn.addEventListener('click', () => {
                    closeImageModal();
                });
            }

            if (imageModal) {
                imageModal.addEventListener('click', (event) => {
                    if (event.target === imageModal) {
                        closeImageModal();
                    }
                });

                imageModal.addEventListener('paste', async (event) => {
                    const clipboardItems = event.clipboardData?.items || [];
                    const imageItem = Array.from(clipboardItems).find((item) => item.type && item.type.startsWith('image/'));
                    if (!imageItem) return;

                    event.preventDefault();
                    const file = imageItem.getAsFile();
                    if (!file) return;

                    try {
                        const uploadedUrl = await uploadImageFileToCloudflare(file, 'Uploading pasted image');
                        if (imageUrlInput) imageUrlInput.value = uploadedUrl;
                        if (imageUploadFileInput) imageUploadFileInput.value = '';
                        if (imageUploadFileName) imageUploadFileName.textContent = '';
                    } catch (error) {
                        console.error('Clipboard image upload failed:', error);
                        setImageUploadStatus('Upload failed: ' + (error.message || 'unknown error'), true);
                    }
                });
            }

            if (imageUploadFileInput) {
                imageUploadFileInput.addEventListener('change', (event) => {
                    const file = event.target.files && event.target.files[0] ? event.target.files[0] : null;
                    if (imageUploadFileName) {
                        imageUploadFileName.textContent = file ? file.name : '';
                    }
                    if (file && imageUrlInput) {
                        imageUrlInput.value = '';
                    }
                    setImageUploadStatus('');
                });
            }

            if (insertImageBtn) {
                insertImageBtn.addEventListener('click', async () => {
                    const rawUrl = imageUrlInput ? imageUrlInput.value.trim() : '';
                    const uploadFile = imageUploadFileInput && imageUploadFileInput.files ? imageUploadFileInput.files[0] : null;

                    let finalUrl = rawUrl;
                    if (uploadFile) {
                        const originalText = insertImageBtn.textContent;
                        insertImageBtn.disabled = true;
                        insertImageBtn.textContent = 'Uploading...';
                        try {
                            finalUrl = await uploadImageFileToCloudflare(uploadFile, 'Uploading selected image');
                            if (imageUrlInput) imageUrlInput.value = finalUrl;
                        } catch (error) {
                            console.error('Cloudflare upload failed:', error);
                            setImageUploadStatus('Upload failed: ' + (error.message || 'unknown error'), true);
                            alert('Cloudflare upload failed: ' + (error.message || 'unknown error'));
                            return;
                        } finally {
                            insertImageBtn.disabled = false;
                            insertImageBtn.textContent = originalText;
                        }
                    }

                    if (!finalUrl) {
                        alert('Enter an image URL or choose an image file.');
                        return;
                    }

                    const normalizedUrl = /^(https?:\/\/|data:image\/)/i.test(finalUrl) ? finalUrl : `https://${finalUrl}`;
                    const inserted = insertImageAtSelection(normalizedUrl);
                    if (!inserted) return;

                    if (imageUrlInput) imageUrlInput.value = '';
                    closeImageModal();
                });
            }

            if (els.toolbarToggle && els.mdToolbar) {
                els.toolbarToggle.addEventListener('click', () => {
                    const expanded = els.mdToolbar.classList.toggle('is-expanded');
                    els.toolbarToggle.setAttribute('aria-expanded', String(expanded));
                    els.toolbarToggle.setAttribute('aria-label', expanded ? 'Collapse toolbar' : 'Expand toolbar');
                });
            }

            if (symbolsModal) {
                symbolsModal.addEventListener('click', (event) => {
                    if (event.target === symbolsModal) {
                        symbolsModal.style.display = 'none';
                    }
                });
            }

            document.querySelectorAll('.symbol-btn').forEach(btn => {
                btn.addEventListener('click', (event) => {
                    event.preventDefault();
                    const symbol = btn.getAttribute('data-symbol') || '';
                    const shouldCopy = document.getElementById('symbolCopyCheckbox')?.checked;

                    if (shouldCopy) {
                        navigator.clipboard.writeText(symbol).catch(() => {});
                    } else {
                        els.courseNotesEditor.focus();
                        document.execCommand('insertText', false, symbol);
                        markEditedBlockAuthor();
                        bumpLocalEditVersion();
                        setDraftState(true);
                        scheduleAutosave();
                    }

                    symbolsModal.style.display = 'none';
                });
            });

            document.addEventListener('keydown', (event) => {
                if (!(event.ctrlKey || event.metaKey) || event.altKey) return;

                const key = (event.key || '').toLowerCase();
                const code = event.code || '';
                if (key === 's') {
                    event.preventDefault();
                    saveCurrentCourseNote(false);
                } else if (key === 'b') {
                    event.preventDefault();
                    applyCommand('bold');
                } else if (key === 'i') {
                    event.preventDefault();
                    applyCommand('italic');
                } else if (key === 'u') {
                    event.preventDefault();
                    applyCommand('underline');
                } else if (code === 'KeyG') {
                    event.preventDefault();
                    applyCommand('bullet');
                } else if (key === 'k') {
                    event.preventDefault();
                    applyCommand('link');
                } else if (key === '8' && event.shiftKey) {
                    event.preventDefault();
                    applyCommand('bullet');
                } else if (key === '1') {
                    event.preventDefault();
                    applyCommand('h1');
                } else if (key === '2') {
                    event.preventDefault();
                    applyCommand('h2');
                } else if (key === '3') {
                    event.preventDefault();
                    applyCommand('h3');
                } else if (key === '4') {
                    event.preventDefault();
                    applyCommand('h4');
                }
            });

            window.addEventListener('pagehide', () => {
                stopLiveblocksPresence();
            });

            window.addEventListener('beforeunload', () => {
                stopLiveblocksPresence();
            });

            init();
        })();
    </script>
