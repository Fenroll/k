  <style>
    :root {
      --bg: #fafafa;
      --fg: #1f2937;
      --card: #ffffff;
      --border: #e5e7eb;
      --app-ui-font: 'Open Sans', Arial, sans-serif;

    * { box-sizing: border-box; }
    html { margin: 0; padding: 0; }
    html, body { margin: 0; padding: 0; }
    body {
      margin: 0;
      padding: 0;
      font-family: var(--app-ui-font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-size: 1em;

    header {
      position: sticky; top: 0; z-index: 10;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      margin: 0;

      display: flex; align-items: center; gap: 10px;
      width: 100vw;
      position: fixed;
      top: 0;
      left: 0;

    header h1 {
      display: none;

    header a.btn {

    header button.btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 6px;
      background: #eef2ff; color: var(--link); border: 1px solid #c7d2fe;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
    }
    header a.btn:hover, header button.btn:hover {
      background: #e0e7ff;
      transform: scale(1.05);
    }
    header a.btn:active, header button.btn:active {
      transform: scale(0.95);
    }
    header button.btn:hover {
      background: #e0e7ff;
      color: var(--link-hover);
    }
    header a.btn:nth-child(3) {
      display: none;
    }
    header button#summaryBtn {
      display: none !important;
    }
    header button#summaryBtn.visible {
      display: inline-flex !important;
    }
    header button#editBtn {
      display: none;
    }
    header button#editBtn.visible {
      display: inline-flex !important;
    }

      margin-left: auto;
    }
    
    header button#nextH1Btn {

    }

    header a.btn:hover { background: #e0e7ff; color: var(--link-hover); }

    .markdown-body sup,
    .markdown-body sub {

      line-height: 0;
      position: relative;
      vertical-align: baseline;
    }

    .markdown-body sup {
      top: -0.45em;
    }

    .markdown-body sub {
      bottom: -0.2em;
    }

    /* Lists - CRITICAL: Fix for list formatting */
    .markdown-body ul,
    .markdown-body ol {
      margin: 0.2em 0;
      padding-left: 1.5em;
      list-style-position: outside;
    }

    .markdown-body li {
      margin: 0.2em 0;
      padding: 0;
      display: list-item;
    }

    /* Remove <p> tags inside list items - they should not exist */
    .markdown-body li p {
      margin: 0 !important;
      padding: 0 !important;
      display: inline !important;
    }

    /* Prevent nested list paragraph issues */
    .markdown-body li > ul,
    .markdown-body li > ol {
      margin: 0.15em 0 0 0;
      padding-left: 1.5em;
    }

    /* Ensure list structure is clean */
    .markdown-body ul ul, .markdown-body ul ol,
    .markdown-body ol ul, .markdown-body ol ol {
      margin-top: 0.1em;
      padding-left: 1.5em;
    }

    /* Reduce space between paragraph and following list */
    .markdown-body p + ul,
    .markdown-body p + ol {
      margin-top: -0.5em;
    }

    /* Reduce space between heading and following content */
    .markdown-body h1 + p,
    .markdown-body h2 + p,
    .markdown-body h3 + p,
    .markdown-body h4 + p,
    .markdown-body h1 + ul,
    .markdown-body h2 + ul,
    .markdown-body h3 + ul,
    .markdown-body h4 + ul,
    .markdown-body h1 + ol,
    .markdown-body h2 + ol,
    .markdown-body h3 + ol,
    .markdown-body h4 + ol {
      margin-top: 0;
    }

    /* Reduce space between consecutive headings */
    .markdown-body h1 + h2,
    .markdown-body h1 + h3,
    .markdown-body h1 + h4,
    .markdown-body h2 + h3,
    .markdown-body h2 + h4,

    }

    /* Additional list styles */
    .markdown-body ul,
    .markdown-body ol {
      margin: 0.2em 0;
      padding-left: 1.5em;
    }

    .markdown-body li {
      margin: 0.2em 0;
    }

    .markdown-body ul ul {
      list-style-type: circle;
    }

    .markdown-body ul ul ul {
      list-style-type: square;
    }

    /* Add padding to content so h1 doesn't hide under fixed header */
    #content { padding-top: 20px; }

    /* Tables: make horizontally scrollable on small screens */
    .table-scroll { overflow-x: auto; margin: 0.5em 0; }

    .markdown-body table { width: 100%; border-collapse: collapse; margin: 0.2em 0; table-layout: auto; }

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function applyUserPreferredFont() {
      const fontMap = {
        'open-sans': "'Open Sans', Arial, sans-serif",
        'noto-sans': "'Noto Sans', Arial, sans-serif",
        'roboto': "'Roboto', Arial, sans-serif",
        'fira-sans': "'Fira Sans', Arial, sans-serif",
        // Legacy keys kept for compatibility with old saved preferences
        'ibm-plex-sans': "'Roboto', Arial, sans-serif",
        'pt-sans': "'Fira Sans', Arial, sans-serif",
        'ubuntu': "'Fira Sans', Arial, sans-serif",
        'rubik': "'Rubik', Arial, sans-serif"
      };

      let preferredFont = 'open-sans';
      try {
        const raw = localStorage.getItem('loggedInUser');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.preferredFont) {
            preferredFont = String(parsed.preferredFont).toLowerCase();
          }
        }
      } catch (_) {
      }

      document.documentElement.style.setProperty('--app-ui-font', fontMap[preferredFont] || fontMap['open-sans']);
    })();

    // Configure marked.js to handle custom image width
    marked.use({
      renderer: {
        link(href, title, text) {
          const rawHref = String(href || '').trim();
          const rawText = String(text || 'Audio').trim() || 'Audio';
          const isMp3 = /\.mp3(?:[?#].*)?$/i.test(rawHref);

          if (!isMp3) {
            const safeHref = rawHref.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const safeText = rawText.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const safeTitle = title ? String(title).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
            return `<a href="${safeHref}"${safeTitle ? ` title="${safeTitle}"` : ''}>${safeText}</a>`;
          }

          const safeHref = rawHref.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return `<span class="audio-link-inline" data-audio-src="${safeHref}"><button type="button" class="audio-link-icon" aria-label="Play audio" title="Play audio"><img src="svg/md-editor/icon-sound.svg" alt="Play audio"></button><audio preload="none" src="${safeHref}"></audio></span>`;
        },
        image(href, title, text) {
          let style = 'max-width:100%; height:auto; display:block; margin:8px auto 8px 0;';
          let dataWidth = '';
          let dataAlign = ' data-align="left"';

          if (title) {
            const widthMatch = title.match(/width=(\d+)%/);
            if (widthMatch && widthMatch[1]) {
              style = `max-width:${widthMatch[1]}%; height:auto; display:block; margin:8px auto 8px 0;`;
              dataWidth = ` data-width="${widthMatch[1]}"`;
            }

            const alignMatch = title.match(/align=(left|center|right)/i);
            const align = alignMatch && alignMatch[1] ? alignMatch[1].toLowerCase() : 'left';
            if (align === 'center') {
              style = style.replace(/margin:[^;]*;/i, 'margin:8px auto;');
            } else if (align === 'right') {
              style = style.replace(/margin:[^;]*;/i, 'margin:8px 0 8px auto;');
            } else {
              style = style.replace(/margin:[^;]*;/i, 'margin:8px auto 8px 0;');
            }
            dataAlign = ` data-align="${align}"`;
          }
          // Remove the custom width from the title so it doesn't show as a tooltip
          const cleanTitle = title ? title.replace(/width=\d+%/g, '').replace(/align=(left|center|right)/gi, '').trim() : '';

          // Add data-original-src for consistency if not already an online image
          const dataOriginalSrc = (href.startsWith('http://') || href.startsWith('https://'))
            ? `data-original-src="${href}"`
            : '';

          return `<img src="${href}?v=202602171mhr" alt="${text}" style="${style}"${dataWidth}${dataAlign}${dataOriginalSrc}${cleanTitle ? ` title="${cleanTitle}"` : ''}>`;
        }
      }
    });
  </script>

  <script>
    // Font size button setup - runs after content div exists
    (function() {
      const SIZES = ['0,6em','0.8em', '1em', '1.2em'];
      let idx = 1;
      const btn = document.getElementById('fontSizeBtn');
      const content = document.getElementById('content');
      
      if (btn && content) {
        const saved = localStorage.getItem('mdViewerFontSize');
        if (saved) {
          content.style.fontSize = saved;
          const i = SIZES.indexOf(saved);
          if (i !== -1) idx = i;
        }
        
        btn.onclick = () => {
          // If at the top of the page, stay at top
          if (window.scrollY < 100) {
            idx = (idx + 1) % SIZES.length;
            content.style.fontSize = SIZES[idx];
            localStorage.setItem('mdViewerFontSize', SIZES[idx]);
            return;
          }
          
          // Find element currently in viewport to maintain position
          const elements = content.querySelectorAll('h1, h2, h3, p, li, td');
          let targetElement = null;
          let minDistance = Infinity;
          
          const viewportCenter = window.scrollY + window.innerHeight / 3;
          
          elements.forEach(el => {
            const rect = el.getBoundingClientRect();
            const elTop = rect.top + window.scrollY;
            const distance = Math.abs(elTop - viewportCenter);
            
            if (distance < minDistance) {
              minDistance = distance;
              targetElement = el;
            }
          });
          
          // Change font size
          idx = (idx + 1) % SIZES.length;
          content.style.fontSize = SIZES[idx];
          localStorage.setItem('mdViewerFontSize', SIZES[idx]);
          
          // Restore scroll position to target element
          if (targetElement) {
            setTimeout(() => {
              const headerHeight = 100;
              const y = targetElement.getBoundingClientRect().top + window.scrollY - headerHeight;
              window.scrollTo({ top: y, behavior: 'auto' });
            }, 10);
          }
        };
      }
    })();
  </script>

  <script>
    // Function to process table rowspans (convert ^ to rowspan)
    function processTableRowspans(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const tables = doc.querySelectorAll('table');
      
      tables.forEach(table => {
        const rows = Array.from(table.querySelectorAll('tbody tr'));
        
        // Process each column
        const maxCols = Math.max(...rows.map(row => row.cells.length));
        
        for (let colIndex = 0; colIndex < maxCols; colIndex++) {
          let spanStart = -1;
          let spanCount = 0;
          
          for (let rowIndex = 0; rowIndex < rows.length; rowIndex++) {
            const cell = rows[rowIndex].cells[colIndex];
            
            if (!cell) continue;
            
            const cellText = cell.textContent.trim();
            
            if (cellText === '^') {
              // Mark cell for deletion and count span
              cell.setAttribute('data-delete', 'true');
              spanCount++;
            } else {
              // If we were counting spans, apply rowspan
              if (spanCount > 0 && spanStart >= 0) {
                const spanCell = rows[spanStart].cells[colIndex];
                if (spanCell) {
                  spanCell.setAttribute('rowspan', spanCount + 1);
                }
              }
              // Reset for next potential span
              spanStart = rowIndex;
              spanCount = 0;
            }
          }
          
          // Handle trailing spans
          if (spanCount > 0 && spanStart >= 0) {
            const spanCell = rows[spanStart].cells[colIndex];
            if (spanCell) {
              spanCell.setAttribute('rowspan', spanCount + 1);
            }
          }
        }
        
        // Remove cells marked for deletion
        table.querySelectorAll('[data-delete="true"]').forEach(cell => cell.remove());
      });
      
      return doc.body.innerHTML;
    }

    // Function to process table colspans (convert < to colspan)
    function processTableColspans(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const tables = doc.querySelectorAll('table');
      
      tables.forEach(table => {
        const rows = Array.from(table.querySelectorAll('tbody tr'));
        
        // Process each row
        rows.forEach(row => {
          const cells = Array.from(row.cells);
          let spanStart = -1;
          let spanCount = 0;
          
          for (let colIndex = 0; colIndex < cells.length; colIndex++) {
            const cell = cells[colIndex];
            const cellText = cell.innerHTML.trim();
            
            if (cellText === '&lt;') {
              // Mark cell for deletion and count span
              cell.setAttribute('data-delete-colspan', 'true');
              spanCount++;
            } else {
              // If we were counting spans, apply colspan
              if (spanCount > 0 && spanStart >= 0) {
                const spanCell = cells[spanStart];
                if (spanCell) {
                  spanCell.setAttribute('colspan', spanCount + 1);
                }
              }
              // Reset for next potential span
              spanStart = colIndex;
              spanCount = 0;
            }
          }
          
          // Handle trailing spans
          if (spanCount > 0 && spanStart >= 0) {
            const spanCell = cells[spanStart];
            if (spanCell) {
              spanCell.setAttribute('colspan', spanCount + 1);
            }
          }
        });
        
        // Remove cells marked for deletion
        table.querySelectorAll('[data-delete-colspan="true"]').forEach(cell => cell.remove());
      });
      
      return doc.body.innerHTML;
    }

    // Function to process table cell alignment (>>text<<, <<text, text>>)
    function processTableAlignment(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const tables = doc.querySelectorAll('table');
      
      tables.forEach(table => {
        const allCells = table.querySelectorAll('td, th');
        
        allCells.forEach(cell => {
          let content = cell.innerHTML.trim();
          
          // Check for center alignment >>text<<
          if (content.startsWith('&gt;&gt;') && content.endsWith('&lt;&lt;')) {
            cell.style.textAlign = 'center';
            cell.innerHTML = content.slice(8, -8); // Remove &gt;&gt; and &lt;&lt;
          }
          // Check for left alignment <<text
          else if (content.startsWith('&lt;&lt;')) {
            cell.style.textAlign = 'left';
            cell.innerHTML = content.slice(8); // Remove &lt;&lt;
          }
          // Check for right alignment text>>
          else if (content.endsWith('&gt;&gt;')) {
            cell.style.textAlign = 'right';
            cell.innerHTML = content.slice(0, -8); // Remove &gt;&gt;
          }
        });
      });
      
      return doc.body.innerHTML;
    }

    // Generous image lazy-loading for fast h1 jumps
    const IMAGE_PRELOAD_MARGIN_PX = 2800;
    const IMAGE_EAGER_COUNT = 6;
    let mdImageIntersectionObserver = null;
    let mdImageMutationObserver = null;
    let mdImageScrollBound = false;
    let mdLightboxBound = false;

    function promoteNearbyImages(root) {
      const viewportTop = window.scrollY - IMAGE_PRELOAD_MARGIN_PX;
      const viewportBottom = window.scrollY + window.innerHeight + IMAGE_PRELOAD_MARGIN_PX;

      root.querySelectorAll('img').forEach(img => {
        const rect = img.getBoundingClientRect();
        const absoluteTop = rect.top + window.scrollY;
        const absoluteBottom = rect.bottom + window.scrollY;

        if (absoluteBottom >= viewportTop && absoluteTop <= viewportBottom) {
          img.loading = 'eager';
          if (!img.getAttribute('fetchpriority')) {
            img.setAttribute('fetchpriority', 'high');
          }
        }
      });
    }

    function configureContentImages(root) {
      const images = Array.from(root.querySelectorAll('img'));

      images.forEach((img, index) => {
        if (!img.dataset.mdImageConfigured) {
          img.dataset.mdImageConfigured = '1';
          img.setAttribute('decoding', 'async');
          img.setAttribute('loading', 'lazy');
        }

        if (!img.closest('.audio-link-inline')) {
          img.classList.add('md-enlargeable-image');
        }

        if (index < IMAGE_EAGER_COUNT) {
          img.setAttribute('loading', 'eager');
          img.setAttribute('fetchpriority', 'high');
        }

        if (mdImageIntersectionObserver && !img.complete) {
          mdImageIntersectionObserver.observe(img);
        }
      });

      promoteNearbyImages(root);
    }

    function initGenerousImageLoading() {
      const root = document.getElementById('content');
      if (!root) return;

      if (!mdImageIntersectionObserver && 'IntersectionObserver' in window) {
        mdImageIntersectionObserver = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              img.setAttribute('loading', 'eager');
              if (!img.getAttribute('fetchpriority')) {
                img.setAttribute('fetchpriority', 'high');
              }
              mdImageIntersectionObserver.unobserve(img);
            }
          });
        }, {
          root: null,
          rootMargin: `${IMAGE_PRELOAD_MARGIN_PX}px 0px`,
          threshold: 0.01
        });
      }

      if (!mdImageMutationObserver) {
        mdImageMutationObserver = new MutationObserver(() => {
          configureContentImages(root);
        });
        mdImageMutationObserver.observe(root, { childList: true, subtree: true });
      }

      if (!mdImageScrollBound) {
        let scrollTimer = null;
        const onScrollOrResize = () => {
          if (scrollTimer) return;
          scrollTimer = setTimeout(() => {
            scrollTimer = null;
            promoteNearbyImages(root);
          }, 80);
        };
        window.addEventListener('scroll', onScrollOrResize, { passive: true });
        window.addEventListener('resize', onScrollOrResize);
        mdImageScrollBound = true;
      }

      configureContentImages(root);
    }

    function initImageLightbox() {
      if (mdLightboxBound) return;

      const root = document.getElementById('content');
      const overlay = document.getElementById('imageLightbox');
      const overlayStage = document.getElementById('imageLightboxStage');
      const overlayImage = document.getElementById('imageLightboxImage');
      if (!root || !overlay || !overlayStage || !overlayImage) return;

      const minScale = 1;
      const maxScale = 6;
      let scale = 1;
      let translateX = 0;
      let translateY = 0;
      let dragging = false;
      let pointerMoved = false;
      const pointers = new Map();
      let dragPointerId = null;
      let dragStartX = 0;
      let dragStartY = 0;
      let dragStartTranslateX = 0;
      let dragStartTranslateY = 0;
      let pinchStartDistance = 0;
      let pinchStartScale = 1;
      let pinchStartTranslateX = 0;
      let pinchStartTranslateY = 0;
      let pinchStartMidpoint = null;

      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      const clampTranslation = () => {
        const stageWidth = overlayStage.clientWidth || window.innerWidth;
        const stageHeight = overlayStage.clientHeight || window.innerHeight;
        const imageWidth = overlayImage.clientWidth || 0;
        const imageHeight = overlayImage.clientHeight || 0;

        if (!imageWidth || !imageHeight) {
          translateX = 0;
          translateY = 0;
          return;
        }

        const scaledWidth = imageWidth * scale;
        const scaledHeight = imageHeight * scale;

        const maxOffsetX = Math.max(0, (scaledWidth - stageWidth) / 2);
        const maxOffsetY = Math.max(0, (scaledHeight - stageHeight) / 2);

        translateX = clamp(translateX, -maxOffsetX, maxOffsetX);
        translateY = clamp(translateY, -maxOffsetY, maxOffsetY);
      };

      const applyTransform = () => {
        clampTranslation();
        overlayImage.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
        overlayImage.style.cursor = scale > 1 ? (dragging ? 'grabbing' : 'grab') : 'zoom-in';
      };

      const resetTransform = () => {
        scale = 1;
        translateX = 0;
        translateY = 0;
        dragging = false;
        pointerMoved = false;
        pointers.clear();
        dragPointerId = null;
        pinchStartDistance = 0;
        pinchStartScale = 1;
        pinchStartTranslateX = 0;
        pinchStartTranslateY = 0;
        pinchStartMidpoint = null;
        applyTransform();
      };

      const distanceBetween = (a, b) => {
        const dx = b.clientX - a.clientX;
        const dy = b.clientY - a.clientY;
        return Math.hypot(dx, dy);
      };

      const midpointBetween = (a, b) => ({
        x: (a.clientX + b.clientX) / 2,
        y: (a.clientY + b.clientY) / 2
      });

      const closeLightbox = () => {
        overlay.classList.remove('is-open');
        overlay.setAttribute('aria-hidden', 'true');
        overlayImage.setAttribute('src', '');
        document.body.classList.remove('image-lightbox-open');
        resetTransform();
      };

      const openLightbox = (img) => {
        if (!(img instanceof HTMLImageElement)) return;
        if (img.closest('.audio-link-inline')) return;

        const src = img.currentSrc || img.getAttribute('src') || '';
        if (!src) return;

        overlayImage.setAttribute('src', src);
        overlayImage.setAttribute('alt', img.getAttribute('alt') || 'Увеличено изображение');

        overlay.classList.add('is-open');
        overlay.setAttribute('aria-hidden', 'false');
        document.body.classList.add('image-lightbox-open');
        requestAnimationFrame(() => {
          resetTransform();
        });
      };

      root.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;

        const img = target.closest('img.md-enlargeable-image');
        if (!img || !root.contains(img)) return;

        event.preventDefault();
        openLightbox(img);
      });

      overlayStage.addEventListener('wheel', (event) => {
        if (!overlay.classList.contains('is-open')) return;

        event.preventDefault();

        const previousScale = scale;
        const factor = Math.exp(-event.deltaY * 0.0016);
        const nextScale = clamp(previousScale * factor, minScale, maxScale);
        if (Math.abs(nextScale - previousScale) < 0.001) return;

        const rect = overlayImage.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const relativeX = event.clientX - centerX;
        const relativeY = event.clientY - centerY;

        scale = nextScale;
        translateX = ((translateX + relativeX) * (scale / previousScale)) - relativeX;
        translateY = ((translateY + relativeY) * (scale / previousScale)) - relativeY;
        applyTransform();
      }, { passive: false });

      overlayStage.addEventListener('pointerdown', (event) => {
        if (!overlay.classList.contains('is-open')) return;

        pointers.set(event.pointerId, { clientX: event.clientX, clientY: event.clientY, pointerType: event.pointerType });
        pointerMoved = false;

        if (pointers.size === 2) {
          const [a, b] = Array.from(pointers.values());
          pinchStartDistance = Math.max(1, distanceBetween(a, b));
          pinchStartScale = scale;
          pinchStartTranslateX = translateX;
          pinchStartTranslateY = translateY;
          pinchStartMidpoint = midpointBetween(a, b);
          dragging = false;
          dragPointerId = null;
        } else if (pointers.size === 1 && scale > 1) {
          dragging = true;
          dragPointerId = event.pointerId;
          dragStartX = event.clientX;
          dragStartY = event.clientY;
          dragStartTranslateX = translateX;
          dragStartTranslateY = translateY;
          try { overlayStage.setPointerCapture(event.pointerId); } catch (_) {}
        }
      });

      overlayStage.addEventListener('pointermove', (event) => {
        if (!overlay.classList.contains('is-open') || !pointers.has(event.pointerId)) return;

        const previousPoint = pointers.get(event.pointerId);
        if (previousPoint && (Math.abs(previousPoint.clientX - event.clientX) > 2 || Math.abs(previousPoint.clientY - event.clientY) > 2)) {
          pointerMoved = true;
        }

        pointers.set(event.pointerId, { clientX: event.clientX, clientY: event.clientY, pointerType: event.pointerType });

        if (pointers.size >= 2) {
          const [a, b] = Array.from(pointers.values());
          const currentDistance = Math.max(1, distanceBetween(a, b));
          const currentMidpoint = midpointBetween(a, b);

          const nextScale = clamp((currentDistance / pinchStartDistance) * pinchStartScale, minScale, maxScale);
          scale = nextScale;
          translateX = pinchStartTranslateX + (currentMidpoint.x - pinchStartMidpoint.x);
          translateY = pinchStartTranslateY + (currentMidpoint.y - pinchStartMidpoint.y);
          applyTransform();
          return;
        }

        if (dragging && dragPointerId === event.pointerId && scale > 1) {
          translateX = dragStartTranslateX + (event.clientX - dragStartX);
          translateY = dragStartTranslateY + (event.clientY - dragStartY);
          applyTransform();
        }
      });

      const onPointerUpOrCancel = (event) => {
        pointers.delete(event.pointerId);
        if (dragPointerId === event.pointerId) {
          dragging = false;
          dragPointerId = null;
        }

        if (pointers.size === 1 && scale > 1) {
          const [remainingPointerId, point] = Array.from(pointers.entries())[0];
          dragPointerId = remainingPointerId;
          dragStartX = point.clientX;
          dragStartY = point.clientY;
          dragStartTranslateX = translateX;
          dragStartTranslateY = translateY;
          dragging = true;
        }

        if (scale <= 1.001) {
          scale = 1;
          translateX = 0;
          translateY = 0;
          applyTransform();
        }
      };

      overlayStage.addEventListener('pointerup', onPointerUpOrCancel);
      overlayStage.addEventListener('pointercancel', onPointerUpOrCancel);

      overlay.addEventListener('click', (event) => {
        if (event.target === overlay || event.target === overlayStage) {
          closeLightbox();
        }
      });

      overlayImage.addEventListener('dblclick', (event) => {
        event.preventDefault();
        if (scale > 1) {
          resetTransform();
        } else {
          scale = 2;
          applyTransform();
        }
      });

      overlayStage.addEventListener('click', (event) => {
        if (event.target === overlayImage) {
          if (!pointerMoved && scale <= 1) {
            closeLightbox();
          }
        }
        pointerMoved = false;
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && overlay.classList.contains('is-open')) {
          closeLightbox();
        }
      });

      mdLightboxBound = true;
    }

    // Function to load summary file
    function loadSummary(summaryPath) {
      console.log('loadSummary function called with:', summaryPath);
      const decodedPath = decodeURIComponent(summaryPath);
      const encodedPath = decodedPath.split('/').map(encodeURIComponent).join('/');
      const absoluteUrl = (window.location.origin && window.location.origin !== 'null')
        ? new URL(encodedPath, window.location.origin).href
        : encodedPath;
      
      console.log('Fetching from:', absoluteUrl);

      fetch(absoluteUrl).then(r=>{ 
        if(!r.ok) throw new Error('HTTP '+r.status); 
        return r.text(); 
      })
        .then(content => {
          let html;
          
          if (/\.html$/i.test(decodedPath)) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(content, 'text/html');
            
            // Extract CSS from <style> tags
            const styles = doc.head.querySelectorAll('style');
            let cssContent = '';
            styles.forEach(style => {
              cssContent += style.textContent;
            });
            
            // Add !important to override md-viewer styles
            if (cssContent) {
              const existingStyles = document.querySelectorAll('style');
              let styleExists = false;
              existingStyles.forEach(s => {
                if (s.textContent.includes('/* Imported from file */')) {
                  styleExists = true;
                  s.remove();
                }
              });
              
              cssContent = cssContent.replace(/;(?!important)/g, ' !important;');
              cssContent = '/* Imported from file */\n' + cssContent;
              const styleTag = document.createElement('style');
              styleTag.textContent = cssContent;
              document.head.appendChild(styleTag);
              applyViewerSpacingOverrides();
            }
            
            html = doc.body.innerHTML;
          } else {
            html = marked.parse(content);
          }
          
          const root = document.getElementById('content');
          root.innerHTML = html;
          applyViewerSpacingOverrides();
          
          // Render LaTeX
          if (typeof renderMathInElement !== 'undefined') {
            try {
              renderMathInElement(root, {
                delimiters: [
                  {left: '$$', right: '$$', display: true},
                  {left: '$', right: '$', display: false}
                ],
                throwOnError: false
              });
            } catch (e) {
              console.error('KaTeX error:', e);
            }
          }
          
          // Wrap tables
          root.querySelectorAll('table').forEach(tbl => {
            if(!tbl.parentElement.classList.contains('table-scroll')){
              const wrap = document.createElement('div');
              wrap.className = 'table-scroll';
              tbl.parentElement.insertBefore(wrap, tbl);
              wrap.appendChild(tbl);
            }
          });
          
          root.querySelectorAll('a').forEach(a => a.target = '_blank');
        })
        .catch(err => {
          console.error('Error loading summary:', err);
        });

        const wrap = button.closest('.audio-link-inline') || null;
        const nearestDataSourceHolder = button.closest('[data-audio-src]');

        // If wrapper is missing, use nearest practical container around the button.
        const container = wrap
          || nearestDataSourceHolder
          || button.parentElement
          || button;

        const audioInContainer = container && container.querySelector
          ? container.querySelector('audio[src]')
          : null;

        const audioNearParent = (!audioInContainer && button.parentElement && button.parentElement.querySelector)
          ? button.parentElement.querySelector('audio[src]')
          : null;

        const mp3Link = (container && container.querySelector)
          ? container.querySelector('a[href$=".mp3"],a[href*=".mp3?"],a[href*=".mp3#"]')
          : null;

        const src = (
          (wrap && wrap.getAttribute('data-audio-src'))
          || (nearestDataSourceHolder && nearestDataSourceHolder.getAttribute('data-audio-src'))
          || button.getAttribute('data-audio-src')
          || (audioInContainer && audioInContainer.getAttribute('src'))
          || (audioNearParent && audioNearParent.getAttribute('src'))
          || (mp3Link && mp3Link.getAttribute('href'))
          || ''
        ).trim();

        return {
          wrap,
          container,
          audioEl: audioInContainer || audioNearParent || null,
          src
        };
      };

      event.preventDefault();
      event.stopPropagation();
      const context = resolveAudioContext(audioButton);
      const wrap = context.wrap;
      const audioEl = context.audioEl;
      const src = context.src;
      if (!src) return;

      const player = ensureViewerAudioEngine();
      const isSameSource = (player.getAttribute('data-current-src') || '') === src;
      const isSameButton = activeViewerAudioButton === audioButton && isSameSource;
      if (isSameButton && activeViewerAudio && !activeViewerAudio.paused) {

      if (activeViewerAudio && !activeViewerAudio.paused) {

      }
      if (activeViewerAudioButton) {
        activeViewerAudioButton.classList.remove('is-playing');
      }

      player.loop = false;
      player.muted = false;
      player.volume = 1;
      if (player.src !== src) {
        player.src = src;
      }
      player.setAttribute('data-current-src', src);
      player.play().catch(() => {});

      activeViewerAudio = player;
      activeViewerAudioButton = audioButton;
      audioButton.classList.add('is-playing');

      const onEnded = () => {
        audioButton.classList.remove('is-playing');
        if (activeViewerAudio === player) activeViewerAudio = null;
        if (activeViewerAudioButton === audioButton) activeViewerAudioButton = null;
      };

      player.onended = onEnded;
      player.onpause = () => {

        if (activeViewerAudio === player) activeViewerAudio = null;
        if (activeViewerAudioButton === audioButton) activeViewerAudioButton = null;
        audioButton.classList.remove('is-playing');

      function buildAbsoluteFileUrl(pathValue) {

  <script>
  // --- On-demand course content loader (works on file://) ---
  function loadCourseContent(courseOrId) {
    return new Promise(function(resolve) {
      if (!courseOrId || typeof courses === 'undefined') { resolve(); return; }
      var course = (typeof courseOrId === 'object') ? courseOrId : courses.find(function(c) { return c.id === courseOrId; });
      if (!course) { resolve(); return; }
      if (course._contentLoaded) { resolve(); return; }
      if (!course._contentKey) { course._contentLoaded = true; resolve(); return; }
      var contentKey = course._contentKey || course.id;
      if (window.courseContent && window.courseContent[contentKey]) {
        _mergeCourseContent(course, contentKey);
        resolve();
        return;
      }
      var script = document.createElement('script');
      var rawUrl = 'courses-data/' + contentKey + '.js';
      script.src = (window.VersionManager && typeof window.VersionManager.versionedUrl === 'function')
        ? window.VersionManager.versionedUrl(rawUrl)
        : (rawUrl + ((window.coursesVersion || '') ? ('?v=' + window.coursesVersion) : ''));
      script.onload = function() {
        _mergeCourseContent(course, contentKey);
        resolve();
      };
      script.onerror = function() {
        console.warn('Could not load content for course', contentKey);
        resolve();
      };
      document.head.appendChild(script);
    });
  }
  function _mergeCourseContent(course, contentKey) {
    if (!window.courseContent || !window.courseContent[contentKey]) return;
    var contentMap = window.courseContent[contentKey];
    function getContentByPath(path) {
      if (!path) return null;
      var normalized = path.replace(/\\/g, '/');
      return contentMap[path] || contentMap[normalized] || null;
    }
    function mergeSection(section) {
      if (section.msgNotes) {
        section.msgNotes.forEach(function(note) {
          var noteContent = getContentByPath(note.path);
          if (!note.content && noteContent) {
            note.content = noteContent;
          }
        });
      }
      if (section.files) {
        section.files.forEach(function(file) {
          var fileContent = getContentByPath(file.path);
          if (!file.content && fileContent) {
            file.content = fileContent;
          }
        });
      }
      if (section.subsections) {
        section.subsections.forEach(mergeSection);
      }
    }
    if (course.sections) {
      course.sections.forEach(mergeSection);
    }
    course._contentLoaded = true;
  }
  function findCourseForPath(normalizedPath) {
    if (typeof courses === 'undefined') return null;
    for (var i = 0; i < courses.length; i++) {
      var course = courses[i];
      if (!course.sections) continue;
      for (var j = 0; j < course.sections.length; j++) {
        if (_sectionContainsPath(course.sections[j], normalizedPath)) return course;
      }
    }
    return null;
  }
  function _sectionContainsPath(section, normalizedPath) {
    if (section.msgNotes) {
      for (var k = 0; k < section.msgNotes.length; k++) {
        var p = section.msgNotes[k].path;
        if (p === normalizedPath || (p && p.replace(/\\/g, '/') === normalizedPath)) return true;
      }
    }
    if (section.files) {
      for (var k = 0; k < section.files.length; k++) {
        var p = section.files[k].path;
        if (p === normalizedPath || (p && p.replace(/\\/g, '/') === normalizedPath)) return true;
      }
    }
    if (section.subsections) {
      for (var k = 0; k < section.subsections.length; k++) {
        if (_sectionContainsPath(section.subsections[k], normalizedPath)) return true;
      }
    }
    return false;
  }

      }

      function setTooltipContent(rawNote) {
        const lines = String(rawNote || '').split(/\r\n|\r|\n/);
        const rendered = lines.map((line) => {
          const headingMatch = line.match(/^(#{1,4})\s+(.+)$/);
          if (headingMatch) {
            const level = headingMatch[1].length;
            return `<h${level}>${escapeHtml(headingMatch[2])}</h${level}>`;
          }
          return escapeHtml(line);
        }).join('<br>')
          .replace(/!\[(.*?)\]\((.*?)\)/g, (match, alt, src) => {
            const safeAlt = escapeHtml(alt);
            const trimmedSrc = String(src || '').trim();
            const isAllowedSrc = /^(https?:\/\/|data:image\/|\.\.?\/|\/)/i.test(trimmedSrc);
            const safeSrc = isAllowedSrc ? trimmedSrc.replace(/"/g, '&quot;') : '#';
            return `<img src="${safeSrc}" alt="${safeAlt}">`;
          })
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/_(.+?)_/g, '<em>$1</em>')
          .replace(/`(.+?)`/g, '<code>$1</code>')
          .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        tooltip.innerHTML = rendered;
      }

      function positionTooltipFor(el) {
        const rect = el.getBoundingClientRect();
        const pageX = window.scrollX || window.pageXOffset;
        const pageY = window.scrollY || window.pageYOffset;

        tooltip.style.display = 'block';

        const tooltipRect = tooltip.getBoundingClientRect();
        const viewportWidth = window.innerWidth;

        let left = rect.left + pageX;
        let top = rect.bottom + pageY + 6;

        if (left + tooltipRect.width > pageX + viewportWidth - 10) {
          left = pageX + viewportWidth - tooltipRect.width - 10;
        }
        if (left < pageX + 10) {
          left = pageX + 10;
        }

        const maxTop = pageY + window.innerHeight - tooltipRect.height - 10;
        if (top > maxTop) {
          top = rect.top + pageY - tooltipRect.height - 6;
        }
        if (top < pageY + 10) {
          top = pageY + 10;
        }

        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${top}px`;
      }

      function hideTooltip() {
        tooltip.style.display = 'none';
        activeNoteElement = null;
      }

      tooltip.addEventListener('touchstart', function(e) {
        const touch = e.touches && e.touches[0];
        if (!touch) return;
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        touchMoved = false;
        touchStartedInsideTooltip = true;
      }, { passive: true });

      tooltip.addEventListener('touchmove', function(e) {
        const touch = e.touches && e.touches[0];
        if (!touch) return;
        if (Math.abs(touch.clientX - touchStartX) > 8 || Math.abs(touch.clientY - touchStartY) > 8) {
          touchMoved = true;
        }
      }, { passive: true });

      tooltip.addEventListener('touchend', function(e) {
        if (touchMoved) {
          touchStartedInsideTooltip = false;
          return;
        }
        const target = e.target;
        const tappedLink = target && target.closest ? target.closest('a') : null;
        if (!tappedLink) {
          hideTooltip();
        }
        touchStartedInsideTooltip = false;
      }, { passive: true });

      document.addEventListener('mouseover', function(e) {
        const noteEl = e.target && e.target.closest ? e.target.closest('.editor-note[data-note]') : null;
        if (!noteEl || !contentRoot.contains(noteEl)) return;

        const noteText = noteEl.getAttribute('data-note');
        if (!noteText) {
          hideTooltip();
          return;
        }

        activeNoteElement = noteEl;
        setTooltipContent(noteText);
        positionTooltipFor(noteEl);
      });

      document.addEventListener('mouseout', function(e) {
        if (!activeNoteElement) return;

        const leavingNote = e.target && e.target.closest ? e.target.closest('.editor-note[data-note]') : null;
        if (!leavingNote) return;

        const enteringTooltip = e.relatedTarget && tooltip.contains(e.relatedTarget);
        if (enteringTooltip) return;

        const enteringNote = e.relatedTarget && e.relatedTarget.closest ? e.relatedTarget.closest('.editor-note[data-note]') : null;
        if (enteringNote === leavingNote) return;

        hideTooltip();
      });

      document.addEventListener('touchstart', function(e) {
        if (!activeNoteElement) return;
        touchStartedInsideTooltip = tooltip.contains(e.target);
        if (!touchStartedInsideTooltip) {
          const touch = e.touches && e.touches[0];
          if (touch) {
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchMoved = false;
          }
        }
        const touchedNote = e.target && e.target.closest ? e.target.closest('.editor-note[data-note]') : null;
        const touchedTooltip = touchStartedInsideTooltip;
        if (!touchedNote && !touchedTooltip) {
          hideTooltip();
        }
      }, { passive: true });

      document.addEventListener('touchmove', function(e) {
        if (!activeNoteElement || touchStartedInsideTooltip) return;
        const touch = e.touches && e.touches[0];
        if (!touch) return;
        if (Math.abs(touch.clientX - touchStartX) > 8 || Math.abs(touch.clientY - touchStartY) > 8) {
          touchMoved = true;
        }
      }, { passive: true });

      document.addEventListener('touchend', function(e) {
        if (!activeNoteElement || touchStartedInsideTooltip || touchMoved) return;
        const touchedNote = e.target && e.target.closest ? e.target.closest('.editor-note[data-note]') : null;
        if (touchedNote && touchedNote === activeNoteElement) {
          hideTooltip();
        }
      }, { passive: true });

      window.addEventListener('scroll', function() {
        if (activeNoteElement) {
          positionTooltipFor(activeNoteElement);
        }
      }, { passive: true });

      window.addEventListener('resize', function() {
        if (activeNoteElement) {
          positionTooltipFor(activeNoteElement);
        }
      });
    })();
  </script>

  <!-- H1 Navigation with Arrow Keys -->
  <script>
    (function() {
      let h1Elements = [];
      let currentH1Index = -1;
      const prefetchedImages = new Set();

      function toAbsoluteUrl(src) {
        try {
          return new URL(src, window.location.href).href;
        } catch (_) {
          return src;
        }
      }

      function prefetchImage(src) {
        if (!src) return;
        const abs = toAbsoluteUrl(src);
        if (!abs || prefetchedImages.has(abs)) return;
        prefetchedImages.add(abs);

        const img = new Image();
        img.decoding = 'async';
        img.src = abs;
      }

      function getSectionImagesByH1Index(index) {
        if (index < 0 || index >= h1Elements.length) return [];
        const currentH1 = h1Elements[index];
        const nextH1 = index < h1Elements.length - 1 ? h1Elements[index + 1] : null;
        const sectionImages = [];

        let node = currentH1;
        while (node && node !== nextH1) {
          if (node.nodeType === 1 && node.tagName === 'IMG') {
            sectionImages.push(node);
          }
          if (node.querySelectorAll && node !== currentH1) {
            node.querySelectorAll('img').forEach(img => sectionImages.push(img));
          }
          node = node.nextElementSibling;
        }

        if (sectionImages.length === 0) {
          currentH1.querySelectorAll('img').forEach(img => sectionImages.push(img));
        }

        return sectionImages;
      }

      function prefetchAssetsAroundH1(index) {
        const targets = [index, index - 1, index + 1, index - 2, index + 2]
          .filter(i => i >= 0 && i < h1Elements.length);

        targets.forEach(i => {
          const images = getSectionImagesByH1Index(i);
          images.forEach(img => prefetchImage(img.getAttribute('src')));
        });
      }
      
      // Function to update h1 elements list
      function updateH1List() {
        h1Elements = Array.from(document.querySelectorAll('#content h1'));
      }
      
      // Function to scroll to h1 element
      function scrollToH1(index) {
        if (index >= 0 && index < h1Elements.length) {
          const h1 = h1Elements[index];
          const headerHeight = document.querySelector('header').offsetHeight || 0;
          const yOffset = -headerHeight - 20; // Add some extra padding
          const y = h1.getBoundingClientRect().top + window.pageYOffset + yOffset;
          
          window.scrollTo({ top: y, behavior: 'auto' });
          currentH1Index = index;
          
          // Visual feedback - briefly highlight the h1
          h1.style.transition = 'background-color 0.3s ease';
          const originalBg = h1.style.backgroundColor;
          h1.style.backgroundColor = 'rgba(124, 58, 237, 0.1)';
          setTimeout(() => {
            h1.style.backgroundColor = originalBg;
          }, 600);

          prefetchAssetsAroundH1(index);
        }
      }
      
      // Function to find current h1 based on scroll position
      function findCurrentH1() {
        const scrollPosition = window.scrollY + 100; // Offset for header
        
        for (let i = h1Elements.length - 1; i >= 0; i--) {
          if (h1Elements[i].offsetTop <= scrollPosition) {
            return i;
          }
        }
        return 0;
      }
      
      // Button Handlers for Mobile
      const prevH1Btn = document.getElementById('prevH1Btn');
      const nextH1Btn = document.getElementById('nextH1Btn');

      if (prevH1Btn) {
        prevH1Btn.addEventListener('click', (e) => {
          e.preventDefault();
          // Update list if needed (in case content changed)
          if (h1Elements.length === 0) {
            updateH1List();
          }
          if (h1Elements.length === 0) return;

          if (currentH1Index === -1) {
            currentH1Index = findCurrentH1();
          }
          const prevIndex = (currentH1Index - 1 + h1Elements.length) % h1Elements.length;
          scrollToH1(prevIndex);
        });
      }

      if (nextH1Btn) {
        nextH1Btn.addEventListener('click', (e) => {
          e.preventDefault();
          // Update list if needed (in case content changed)
          if (h1Elements.length === 0) {
            updateH1List();
          }
          if (h1Elements.length === 0) return;

          if (currentH1Index === -1) {
            currentH1Index = findCurrentH1();
          }
          const nextIndex = (currentH1Index + 1) % h1Elements.length;
          scrollToH1(nextIndex);
        });
      }

      // Listen for arrow key presses
      document.addEventListener('keydown', (e) => {
        // Ignore if user is typing in an input field
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
          return;
        }
        
        // Update list if needed (in case content changed)
        if (h1Elements.length === 0) {
          updateH1List();
        }
        
        if (h1Elements.length === 0) return;
        
        // Right Arrow - next h1
        if (e.key === 'ArrowRight') {
          e.preventDefault();
          if (currentH1Index === -1) {
            currentH1Index = findCurrentH1();
          }
          const nextIndex = (currentH1Index + 1) % h1Elements.length;
          scrollToH1(nextIndex);
        }
        
        // Left Arrow - previous h1
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (currentH1Index === -1) {
            currentH1Index = findCurrentH1();
          }
          const prevIndex = (currentH1Index - 1 + h1Elements.length) % h1Elements.length;
          scrollToH1(prevIndex);
        }
      });
      
      // Initialize h1 list when content loads
      function initH1Navigation() {
        setTimeout(() => {
          updateH1List();
          if (h1Elements.length > 0) {
            const initialIndex = findCurrentH1();
            prefetchAssetsAroundH1(initialIndex);
          }
        }, 500);
      }
      
      // Watch for content changes
      const contentDiv = document.getElementById('content');
      if (contentDiv) {
        const observer = new MutationObserver(() => {
          updateH1List();
          if (h1Elements.length > 0) {
            const idx = currentH1Index >= 0 ? currentH1Index : findCurrentH1();
            prefetchAssetsAroundH1(idx);
          }
        });
        
        observer.observe(contentDiv, {
          childList: true,
          subtree: true
        });
      }
      
      // Initialize on page load
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initH1Navigation);
      } else {
        initH1Navigation();
      }
    })();
  </script>

<!-- Hydration Script: Ensures fresh content on reload even if sessionKey is present -->
<script>
  (function() {
    // Only run if courses data is available
    if (typeof courses === 'undefined') return;

    function getParam(name){ const u=new URL(window.location.href); return u.searchParams.get(name); }
    const path = getParam('path');
    if (!path) return;

    const decodedPath = decodeURIComponent(path);
    const normalizedPath = decodedPath.replace(/\\/g, '/');

    // Recursive search function
    function findFileInCourses(fileList) {
      for (const course of fileList) {
        if (course.sections) {
          for (const section of course.sections) {
            const result = searchSection(section);
            if (result) return result;
          }
        }
      }
      return null;
    }

    function searchSection(section) {
      if (section.files) {
        for (const file of section.files) {
          if (file.path === normalizedPath || file.path.replace(/\\/g, '/') === normalizedPath) {
            return file;
          }
        }
      }
      if (section.msgNotes) {
        for (const note of section.msgNotes) {
          if (note.path === normalizedPath || note.path.replace(/\\/g, '/') === normalizedPath) {
            return note;
          }
        }
      }
      if (section.subsections) {
        for (const subsection of section.subsections) {
          const result = searchSection(subsection);
          if (result) return result;
        }
      }
      return null;
    }

    // Attempt to find the file in the fresh courses data
    const fileData = findFileInCourses(courses);

    // If we found the file and it has content (e.g. msgNote), force update the view
    // This overrides whatever might have been loaded from stale sessionStorage
    if (fileData && fileData.content) {
      console.log('Hydrating content from fresh courses data for:', normalizedPath);
      
      const root = document.getElementById('content');
      let html;

      if (fileData.type === 'html' || fileData.content.includes('<!DOCTYPE')) {
         const parser = new DOMParser();
         const doc = parser.parseFromString(fileData.content, 'text/html');
         // Extract CSS... (simplified for hydration, assuming styles already loaded or we just replace body)
         // For robustness, we re-run the style extraction logic briefly if needed, 
         // but for text notes, usually body innerHTML is enough.
         html = doc.body.innerHTML;
      } else {
         // Re-parse markdown
         html = marked.parse(fileData.content);
         html = html.replace(/<p>~~~<\/p>/g, '<hr style="border: none; border-top: 2px dashed #8B6F47;">');
         if (html.includes('^')) html = processTableRowspans(html);
         if (html.includes('&gt;&gt;') || html.includes('&lt;&lt;')) html = processTableAlignment(html);
         if (html.includes('&lt;')) html = processTableColspans(html);
      }

      root.innerHTML = html;
      applyViewerSpacingOverrides();

      // Re-run KaTeX
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(root, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
      }

      // Re-wrap tables
      root.querySelectorAll('table').forEach(tbl => {
        if(!tbl.parentElement.classList.contains('table-scroll')){
          const wrap = document.createElement('div');
          wrap.className = 'table-scroll';
          tbl.parentElement.insertBefore(wrap, tbl);
          wrap.appendChild(tbl);
        }
      });
      
      root.querySelectorAll('a').forEach(a => a.target = '_blank');
    }
  })();

</script>
