  <style>
    /* Avoid browser find matching hidden KaTeX accessibility text. */
    .katex .katex-mathml {
      display: none !important;
    }

    :root {
      --bg: #fafafa;
      --fg: #1f2937;
      --card: #ffffff;
      --border: #e5e7eb;
      --app-ui-font: 'Open Sans', Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html { margin: 0; padding: 0; }
    html, body { margin: 0; padding: 0; }
    body {
      margin: 0;
      padding: 0;
      font-family: var(--app-ui-font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-size: 1em;
    }

    @media (max-width: 600px) {
      /* md-viewer has no persistent bottom nav, so keep chat icon lower here */
      #chat-widget.chat-widget {
        bottom: max(10px, env(safe-area-inset-bottom)) !important;
      }
    }
    header {
      position: sticky; top: 0; z-index: 10;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      margin: 0;
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      width: 100vw;
      position: fixed;
      top: 0;
      left: 0;
    }
    header h1 {
      display: none;
    }
    header a.btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 6px; text-decoration: none;
      background: #eef2ff; color: var(--link); border: 1px solid #c7d2fe;
      transition: background 0.2s, transform 0.1s;
    }
    header button.btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 6px;
      background: #eef2ff; color: var(--link); border: 1px solid #c7d2fe;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
    }
    header a.btn:hover, header button.btn:hover {
      background: #e0e7ff;
      transform: scale(1.05);
    }
    header a.btn:active, header button.btn:active {
      transform: scale(0.95);
    }
    header button.btn:hover {
      background: #e0e7ff;
      color: var(--link-hover);
    }
    header a.btn:nth-child(3) {
      display: none;
    }
    header button#summaryBtn {
      display: none !important;
    }
    header button#summaryBtn.visible {
      display: inline-flex !important;
    }
    header button#editBtn {
      display: none;
    }
    header button#editBtn.visible {
      display: inline-flex !important;
    }

    /* Navigation buttons visible on all devices, pushed to the right */
    header button#prevH1Btn {
      margin-left: auto;
    }

    header button#nextH1Btn {
      margin-right: 10px;
    }

    header a.btn:hover { background: #e0e7ff; color: var(--link-hover); }
    main { max-width: 1700px; margin: 0 auto; padding: 3px 3px; flex: 1; width: 100%; margin-top: 25px; }

    @media (max-width: 900px) {
      header button#editBtn,
      header button#editBtn.visible {
        display: none !important;
      }
    }

    .markdown-body {
      line-height: 1.6;
    }

    /* Headings - match text-editor spacing */
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      margin-top: 0.7em;
      margin-bottom: 0;
      font-weight: 600;
    }

    .markdown-body h1 { font-size: 1.65em; color: #000000; }
    .markdown-body h2 { font-size: 1.3em; color: #000000; }
    .markdown-body h3 { font-size: 1.1em; color: #000000; margin-bottom: 0; }
    .markdown-body h4 { font-size: 1.05em; color: #000000; margin-bottom: 0; }

    .markdown-body h1.md-h1-jump-highlight {
      color: #153f2d;
      background: transparent;
      border-radius: 8px;
      animation: mdH1JumpHighlight 850ms ease-out;
    }

    @keyframes mdH1JumpHighlight {

        background: rgba(88, 129, 87, 0.14);
        box-shadow: 0 0 0 1px rgba(88, 129, 87, 0.28), 0 8px 22px rgba(47, 93, 80, 0.14);

      }

    /* Paragraphs - match md-editor.html */

      margin: 0.3em 0;

    .markdown-body hr {

    .markdown-body hr + p,
    .markdown-body hr + ul,
    .markdown-body hr + ol,
    .markdown-body hr + blockquote,
    .markdown-body hr + pre,
    .markdown-body hr + table {

    .markdown-body img {

      height: auto;
      display: block;
      margin: 8px auto 8px 0;
    }

    .markdown-body img[data-align="left"] {
      margin: 8px auto 8px 0;
    }

    .markdown-body img[data-align="center"] {
      margin: 8px auto;
    }

    .markdown-body img[data-align="right"] {
      margin: 8px 0 8px auto;
    }

    .markdown-body img.md-enlargeable-image {

    .image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.88);
      padding: 14px;
    }

    .image-lightbox.is-open {
      display: flex;
    }

    .image-lightbox-stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }

    .image-lightbox-image {
      max-width: min(96vw, 1800px);
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 12px 42px rgba(0, 0, 0, 0.45);
      user-select: none;
      -webkit-user-drag: none;
      transform: translate3d(0, 0, 0) scale(1);
      transform-origin: center center;
      will-change: transform;
      touch-action: none;
      cursor: zoom-in;

    body.image-lightbox-open {
      overflow: hidden;
      touch-action: none;

        padding: 8px;

    .markdown-body .audio-link-inline {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin: 0.2em 0;
      max-width: 100%;
      vertical-align: middle;
      padding: 5px 7px;

      border-radius: 9px;
      background: #f4f9f2;
      box-shadow: 0 1px 2px rgba(47, 93, 80, 0.08);
    }

    .markdown-body .audio-link-icon {
      width: 26px;
      height: 26px;
      border: 1px solid #588157;
      border-radius: 8px !important;
      background: transparent;
      color: #2f5d50;
      cursor: pointer;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 26px;
      padding: 0;
      text-align: center;
      font-size: 12px;
      box-shadow: 0 1px 3px rgba(47, 93, 80, 0.14);
      appearance: none;
      -webkit-appearance: none;
    }

    .markdown-body .audio-link-icon:hover {
      background: #f1f8ef;
      border-color: #4f754e;
    }

    .markdown-body .audio-link-icon.is-playing {
      background: #588157;
      color: #ffffff;
    }

    .markdown-body .audio-link-inline audio {
      display: none;
    }

    .markdown-body .audio-link-icon img,
    .markdown-body .audio-time {
      display: none !important;
    }

    .markdown-body .audio-link-label {
      max-width: 125px;
      min-width: 0;
      color: var(--text);
      font-size: 0.82em;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .markdown-body .audio-link-label:empty {
      display: none;
    }

    .markdown-body .audio-progress {
      width: 118px;
      accent-color: #588157;
      cursor: pointer;
    }

    .markdown-body .audio-volume {
      width: 44px;
      accent-color: #588157;
      cursor: pointer;
    }

    .markdown-body .audio-progress,
    .markdown-body .audio-volume {
      height: 4px;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
    }

    .markdown-body .audio-progress::-webkit-slider-runnable-track,
    .markdown-body .audio-volume::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: #d7e5d2;
    }

    .markdown-body .audio-progress::-webkit-slider-thumb,
    .markdown-body .audio-volume::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      margin-top: -2px;
      border-radius: 50%;
      border: 0;
      background: #588157;
      box-shadow: 0 1px 2px rgba(47, 93, 80, 0.22);
    }

    .markdown-body .audio-progress::-moz-range-track,
    .markdown-body .audio-volume::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: #d7e5d2;
    }

    .markdown-body .audio-progress::-moz-range-thumb,
    .markdown-body .audio-volume::-moz-range-thumb {
      width: 8px;
      height: 8px;
      border: 0;
      border-radius: 50%;
      background: #588157;
      box-shadow: 0 1px 2px rgba(47, 93, 80, 0.22);
    }

    /* Links */
    .markdown-body a { color: var(--link); text-decoration: underline; text-decoration-skip-ink: none; }
    .markdown-body a:hover { color: var(--link-hover); }

    /* Bold text */
    .markdown-body b,
    .markdown-body strong { font-weight: 600; }

    /* Italic text */
    .markdown-body em { font-style: italic; }

    /* Keep line spacing stable for exported superscript/subscript content. */
    .markdown-body sup,
    .markdown-body sub {
      font-size: 0.75em;
      line-height: 0;
      position: relative;
      vertical-align: baseline;
    }

    .markdown-body sup {
      top: -0.45em;
    }

    .markdown-body sub {
      bottom: -0.2em;
    }

    /* Lists - CRITICAL: Fix for list formatting */
    .markdown-body ul,
    .markdown-body ol {
      margin: 0.2em 0;
      padding-left: 1.5em;
      list-style-position: outside;
    }

    .markdown-body li {
      margin: 0.2em 0;
      padding: 0;
      display: list-item;
    }

    /* Remove <p> tags inside list items - they should not exist */
    .markdown-body li p {
      margin: 0 !important;
      padding: 0 !important;
      display: inline !important;
    }

    /* Prevent nested list paragraph issues */
    .markdown-body li > ul,
    .markdown-body li > ol {
      margin: 0.15em 0 0 0;
      padding-left: 1.5em;
    }

    /* Ensure list structure is clean */
    .markdown-body ul ul, .markdown-body ul ol,
    .markdown-body ol ul, .markdown-body ol ol {
      margin-top: 0.1em;
      padding-left: 1.5em;
    }

    /* Reduce space between paragraph and following list */
    .markdown-body p + ul,
    .markdown-body p + ol {
      margin-top: -0.5em;
    }

    /* Reduce space between heading and following content */
    .markdown-body h1 + p,
    .markdown-body h2 + p,
    .markdown-body h3 + p,
    .markdown-body h4 + p,
    .markdown-body h1 + ul,
    .markdown-body h2 + ul,
    .markdown-body h3 + ul,
    .markdown-body h4 + ul,
    .markdown-body h1 + ol,
    .markdown-body h2 + ol,
    .markdown-body h3 + ol,
    .markdown-body h4 + ol {
      margin-top: 0;
    }

    /* Reduce space between consecutive headings */
    .markdown-body h1 + h2,
    .markdown-body h1 + h3,
    .markdown-body h1 + h4,
    .markdown-body h2 + h3,
    .markdown-body h2 + h4,
    .markdown-body h3 + h4 {
      margin-top: 0.1em;
    }

    /* Additional list styles */
    .markdown-body ul,
    .markdown-body ol {
      margin: 0.2em 0;
      padding-left: 1.5em;
    }

    .markdown-body li {
      margin: 0.2em 0;
    }

    .markdown-body ul ul {
      list-style-type: circle;
    }

    .markdown-body ul ul ul {
      list-style-type: square;
    }

    /* Add padding to content so h1 doesn't hide under fixed header */
    #content { padding-top: 20px; }

    /* Tables: make horizontally scrollable on small screens */
    .table-scroll { overflow-x: auto; margin: 0.5em 0; }
    .table-scroll table { min-width: 560px; }

    .markdown-body table { width: 100%; border-collapse: collapse; margin: 0.2em 0; table-layout: auto; }
    .markdown-body th, .markdown-body td { border: 1px solid rgba(146, 64, 14, 0.35); padding: 6px 10px; text-align: left; vertical-align: top; height: 24px; line-height: 1.2; }
    .markdown-body thead th { background: rgba(196, 127, 9, 0.08); font-weight: 600; }
    .markdown-body tbody tr:nth-child(odd) { background: rgba(146, 64, 14, 0.03); }

    pre, code { font-family: Consolas, 'Courier New', monospace; }
    pre { background: var(--bg); padding: 12px; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border); color: var(--fg); }
    code { background: var(--bg); padding: 2px 6px; border-radius: 4px; color: var(--fg); }

    /* Note styles for viewing exported HTML files */
    .markdown-body .editor-note {
      text-decoration: underline dotted #a3b18a;
      text-decoration-thickness: 2px;
      text-underline-offset: 2px;
      text-decoration-skip-ink: none;
      cursor: help;
      position: relative;
    }

    #noteTooltipViewer {
      position: absolute;
      display: none;
      background-color: #f0f7f0;
      color: #1f2937;
      padding: 8px 12px;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      width: fit-content;
      max-width: min(700px, calc(100vw - 20px));
      max-height: calc(100vh - 20px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
      box-sizing: border-box;
      word-wrap: break-word;
      z-index: 10000;
      font-size: 0.9em;
      line-height: 1.4;
      border: 1px solid #588157;
      pointer-events: auto;
    }
    #noteTooltipViewer ul, #noteTooltipViewer ol {
      margin: 0 !important;
      padding-left: 20px !important;
    }
    #noteTooltipViewer li {
      margin: 0 0 0.1em 0 !important;
      padding: 0 !important;
      line-height: 1.2 !important;
    }
    #noteTooltipViewer li:last-child {
      margin-bottom: 0 !important;
    }
    #noteTooltipViewer h1, #noteTooltipViewer h2, #noteTooltipViewer h3, #noteTooltipViewer h4 {
      margin: 0.25em 0 0.2em 0 !important;
      color: #2f5d50 !important;
      line-height: 1.25 !important;
      font-weight: 700 !important;
      font-family: inherit !important;
      letter-spacing: normal !important;
      text-transform: none !important;
      border: 0 !important;
    }
    #noteTooltipViewer h1 { font-size: 1.1em !important; }
    #noteTooltipViewer h2 { font-size: 1.03em !important; }
    #noteTooltipViewer h3 { font-size: 0.97em !important; }
    #noteTooltipViewer h4 { font-size: 0.93em !important; }
    #noteTooltipViewer img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0.35em 0;
      border-radius: 6px;
    }
    #noteTooltipViewer .note-table-scroll {
      overflow-x: hidden;
      margin: 0.3em 0;
      max-width: 100%;
    }
    #noteTooltipViewer table {
      border-collapse: collapse;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      table-layout: fixed;
      background: #ffffff;
    }
    #noteTooltipViewer th,
    #noteTooltipViewer td {
      border: 1px solid rgba(88, 129, 87, 0.35);
      padding: 4px 8px;
      text-align: left;
      vertical-align: top;
      line-height: 1.3;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    #noteTooltipViewer thead th {
      background: rgba(88, 129, 87, 0.12);
      font-weight: 600;
    }

    @media (max-width: 900px) {
      main { padding: 12px; }
      .markdown-body { font-size: 1em; font-weight: 400; }
      .table-scroll table { font-size: 1em; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function applyUserPreferredFont() {
      const fontMap = {
        'open-sans': "'Open Sans', Arial, sans-serif",
        'noto-sans': "'Noto Sans', Arial, sans-serif",
        'roboto': "'Roboto', Arial, sans-serif",
        'fira-sans': "'Fira Sans', Arial, sans-serif",
        // Legacy keys kept for compatibility with old saved preferences
        'ibm-plex-sans': "'Roboto', Arial, sans-serif",
        'pt-sans': "'Fira Sans', Arial, sans-serif",
        'ubuntu': "'Fira Sans', Arial, sans-serif",
        'rubik': "'Rubik', Arial, sans-serif"
      };

      let preferredFont = 'open-sans';
      try {
        const raw = localStorage.getItem('loggedInUser');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.preferredFont) {
            preferredFont = String(parsed.preferredFont).toLowerCase();
          }
        }
      } catch (_) {
      }

      document.documentElement.style.setProperty('--app-ui-font', fontMap[preferredFont] || fontMap['open-sans']);
    })();

    // Configure marked.js to handle custom image width
    marked.use({
      renderer: {
        link(href, title, text) {
          const rawHref = String(href || '').trim();
          const rawText = String(text || '').trim();
          const isMp3 = /\.mp3(?:[?#].*)?$/i.test(rawHref);

          if (!isMp3) {
            const safeHref = rawHref.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const safeText = rawText.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const safeTitle = title ? String(title).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
            return `<a href="${safeHref}"${safeTitle ? ` title="${safeTitle}"` : ''}>${safeText}</a>`;
          }

          const safeHref = rawHref.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          const safeText = rawText.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          const safeLabel = rawText.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return `<span class="audio-link-inline" data-audio-src="${safeHref}"${safeText ? ` data-audio-label="${safeText}"` : ''}><button type="button" class="audio-link-icon" aria-label="${safeText ? `Play ${safeText}` : 'Play audio'}" title="Play audio">▶</button><span class="audio-link-label">${safeLabel}</span><input class="audio-progress" type="range" min="0" max="1000" value="0" aria-label="Audio position"><input class="audio-volume" type="range" min="0" max="1" step="0.01" value="1" aria-label="Audio volume"><audio preload="metadata" src="${safeHref}"></audio></span>`;
        },
        image(href, title, text) {
          href = String(href || '').trim().replace(/[.,;:!?]+$/g, '');
          let style = 'max-width:100%; height:auto; display:block; margin:8px auto 8px 0;';
          let dataWidth = '';
          let dataAlign = ' data-align="left"';

          if (title) {
            const widthMatch = title.match(/width=(\d+)%/);
            if (widthMatch && widthMatch[1]) {
              style = 'max-width:100%; height:auto; display:block; margin:8px auto 8px 0;';
              dataWidth = ` data-width="${widthMatch[1]}"`;
            }

            const alignMatch = title.match(/align=(left|center|right)/i);
            const align = alignMatch && alignMatch[1] ? alignMatch[1].toLowerCase() : 'left';
            if (align === 'center') {
              style = style.replace(/margin:[^;]*;/i, 'margin:8px auto;');
            } else if (align === 'right') {
              style = style.replace(/margin:[^;]*;/i, 'margin:8px 0 8px auto;');
            } else {
              style = style.replace(/margin:[^;]*;/i, 'margin:8px auto 8px 0;');
            }
            dataAlign = ` data-align="${align}"`;
          }
          // Remove the custom width from the title so it doesn't show as a tooltip
          const cleanTitle = title ? title.replace(/width=\d+%/g, '').replace(/align=(left|center|right)/gi, '').trim() : '';

    (function initCloseViewerButton() {

      const getFallbackUrl = () => {
        try {
          if (document.referrer) {
            const refUrl = new URL(document.referrer, window.location.href);
            if (refUrl.origin === window.location.origin) {
              return refUrl.href;
            }
          }
        } catch (_) {
        }
        return 'index.html';
      };

      closeBtn.addEventListener('click', (event) => {
        event.preventDefault();

        const fallbackUrl = getFallbackUrl();
        const navigateFallback = () => {
          window.location.assign(fallbackUrl);
        };

        if (window.opener && !window.opener.closed) {
          window.close();
          setTimeout(() => {
            if (!document.hidden) navigateFallback();
          }, 220);
          return;
        }

        if (window.history.length > 1) {
          const previousHref = window.location.href;
          window.history.back();

          setTimeout(() => {
            const stillHere = window.location.href === previousHref;

          return;

    (function() {
      const SIZES = ['0.7em', '0.8em', '1em', '1.1em'];
      let idx = 1;
      const btn = document.getElementById('fontSizeBtn');
      const content = document.getElementById('content');

      if (btn && content) {
        const saved = localStorage.getItem('mdViewerFontSize');
        if (saved) {
          content.style.fontSize = saved;
          const i = SIZES.indexOf(saved);
          if (i !== -1) idx = i;
        }

        btn.onclick = () => {
          // If at the top of the page, stay at top
          if (window.scrollY < 100) {
            idx = (idx + 1) % SIZES.length;
            content.style.fontSize = SIZES[idx];
            localStorage.setItem('mdViewerFontSize', SIZES[idx]);
            return;
          }

          // Find element currently in viewport to maintain position
          const elements = content.querySelectorAll('h1, h2, h3, p, li, td');
          let targetElement = null;
          let minDistance = Infinity;

          const viewportCenter = window.scrollY + window.innerHeight / 3;

          elements.forEach(el => {
            const rect = el.getBoundingClientRect();
            const elTop = rect.top + window.scrollY;
            const distance = Math.abs(elTop - viewportCenter);

            if (distance < minDistance) {

      tables.forEach(table => {

        const maxCols = Math.max(...rows.map(row => row.cells.length));

        for (let colIndex = 0; colIndex < maxCols; colIndex++) {

          for (let rowIndex = 0; rowIndex < rows.length; rowIndex++) {
            const cell = rows[rowIndex].cells[colIndex];

            if (!cell) continue;

            const cellText = cell.textContent.trim();

            if (cellText === '^') {
              // Mark cell for deletion and count span
              cell.setAttribute('data-delete', 'true');
              spanCount++;
            } else {
              // If we were counting spans, apply rowspan
              if (spanCount > 0 && spanStart >= 0) {
                const spanCell = rows[spanStart].cells[colIndex];
                if (spanCell) {

              // Reset for next potential span
              spanStart = rowIndex;
              spanCount = 0;

      if (section.files) {
        section.files.forEach(function(file) {
          var fileContent = getContentByPath(file.path);
          if (!file.content && fileContent) {
            file.content = fileContent;
          }
        });
      }
      if (section.subsections) {
        section.subsections.forEach(mergeSection);
      }
    }
    if (course.sections) {
      course.sections.forEach(mergeSection);
    }
    course._contentLoaded = true;
  }
  function findCourseForPath(normalizedPath) {
    var result = findFileInCoursesByPath(normalizedPath);
    return result && result.course;
  }

  <script>
    (function() {
      const isMobile = () => window.matchMedia('(max-width: 900px), (pointer: coarse)').matches;

      const setKeyboardOffset = () => {
        if (!isMobile()) {
          document.documentElement.style.setProperty('--mobile-keyboard-offset', '0px');
          return;
        }

        const vv = window.visualViewport;
        if (!vv) {
          document.documentElement.style.setProperty('--mobile-keyboard-offset', '0px');
          return;
        }

        const inset = Math.max(0, window.innerHeight - (vv.height + vv.offsetTop));
        document.documentElement.style.setProperty('--mobile-keyboard-offset', `${Math.round(inset)}px`);
      };

      const onToggleIntent = (target) => {
        if (!(target instanceof Element) || !isMobile()) return;
        if (target.closest('#notes-toggle-btn')) {
          setKeyboardOffset();
        } else if (target.closest('#chat-toggle')) {
          setKeyboardOffset();
        }
      };

      document.addEventListener('pointerdown', (e) => {
        onToggleIntent(e.target);
      }, true);

      document.addEventListener('touchstart', (e) => {
        onToggleIntent(e.target);
      }, { capture: true, passive: true });

      document.addEventListener('click', (e) => {
        onToggleIntent(e.target);
      }, true);

      document.addEventListener('focusin', (e) => {
        const target = e.target;
        if (!(target instanceof Element) || !isMobile()) return;
        if (target.closest('#chat-widget .chat-input') || target.closest('#notes-widget-container .notes-input')) {
          setKeyboardOffset();
          requestAnimationFrame(setKeyboardOffset);
          setTimeout(setKeyboardOffset, 60);
          setTimeout(setKeyboardOffset, 160);
        }
      }, true);

      const blurIfInputInHiddenWidget = () => {
        const activeEl = document.activeElement;
        if (!(activeEl instanceof Element)) return;

        const chatInput = activeEl.closest('#chat-widget .chat-input');
        if (chatInput) {
          const panel = document.querySelector('#chat-widget .chat-panel');
          if (!panel || !panel.classList.contains('open')) {
            activeEl.blur();
            return;
          }
        }

        const notesInput = activeEl.closest('#notes-widget-container .notes-input');
        if (notesInput) {
          const notesWidget = document.getElementById('notes-widget-container');
          if (!notesWidget || notesWidget.classList.contains('hidden')) {
            activeEl.blur();
          }
        }
      };

      document.addEventListener('click', () => {
        setTimeout(blurIfInputInHiddenWidget, 0);
      }, true);
      document.addEventListener('pointerup', () => {
        setTimeout(blurIfInputInHiddenWidget, 0);
      }, true);

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setKeyboardOffset, { passive: true });
        window.visualViewport.addEventListener('scroll', setKeyboardOffset, { passive: true });
      }

      window.addEventListener('resize', setKeyboardOffset, { passive: true });
      window.addEventListener('orientationchange', () => setTimeout(setKeyboardOffset, 150), { passive: true });
      setKeyboardOffset();
    })();

  <script>
    (function() {
      const contentRoot = document.getElementById('content');
      if (!contentRoot) return;

      let tooltip = document.getElementById('noteTooltipViewer');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.id = 'noteTooltipViewer';
        document.body.appendChild(tooltip);
      }

      tooltip.style.pointerEvents = 'auto';

      let activeNoteElement = null;
      let touchStartX = 0;
      let touchStartY = 0;
      let touchMoved = false;
      let touchStartedInsideTooltip = false;
      let suppressClickUntil = 0;
      const supportsHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

      function isOverlayWidgetTarget(target) {
        if (!(target instanceof Element)) return false;
        return Boolean(target.closest('#chat-widget, #notes-widget-container, #update-notification, #message-options-menu, .reaction-picker'));
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function stripTrailingUrlPunctuation(value) {
        return String(value || '').trim().replace(/[.,;:!?]+$/g, '');
      }

      function applyIntrinsicWidthToTooltipImage(img) {
        const rawPercent = Number(img.getAttribute('data-note-width'));
        const widthPercent = Math.min(100, Math.max(10, Number.isFinite(rawPercent) ? rawPercent : 100));

        const applyWidth = () => {
          const naturalWidth = Number(img.naturalWidth) || 0;
          if (!naturalWidth) return;
          const targetWidthPx = (naturalWidth * widthPercent) / 100;
          img.style.width = `${targetWidthPx}px`;
          img.style.maxWidth = '100%';
          img.style.height = 'auto';
          img.style.display = 'block';
          img.style.margin = '0.35em 0';
          img.style.borderRadius = '6px';
        };

        if (img.complete && img.naturalWidth) {
          applyWidth();
        } else {
          img.addEventListener('load', applyWidth, { once: true });
        }
      }

      function loadTooltipImagesNow() {
        tooltip.querySelectorAll('img[data-note-src]').forEach((img) => {
          const src = img.getAttribute('data-note-src');
          if (!src) return;
          img.setAttribute('src', src);
          img.removeAttribute('data-note-src');
          applyIntrinsicWidthToTooltipImage(img);
        });
      }

      function setTooltipContent(rawNote) {
        const splitTableCells = (line) => String(line || '')
          .trim()
          .replace(/^\|/, '')
          .replace(/\|$/, '')
          .split('|')
          .map((cell) => cell.trim());

        const isTableSeparatorLine = (line) => {
          const cells = splitTableCells(line);
          return cells.length > 0 && cells.every((cell) => /^:?-{3,}:?$/.test(cell));
        };

        const getTableAlignment = (cell) => {
          if (/^:-{3,}:$/.test(cell)) return 'center';
          if (/^-{3,}:$/.test(cell)) return 'right';
          if (/^:-{3,}$/.test(cell)) return 'left';
          return '';
        };

        const lines = String(rawNote || '').split(/\r\n|\r|\n/);
        const html = [];
        const stack = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const indentMatch = line.match(/^(\s*)/);
          const indent = indentMatch ? indentMatch[1].length : 0;
          const content = line.trim();
          const nextLine = i + 1 < lines.length ? lines[i + 1].trim() : '';

          const maybeTableHeader = content.includes('|') && splitTableCells(content).length >= 2;
          const maybeTableSeparator = nextLine.includes('|') && isTableSeparatorLine(nextLine);

          if (maybeTableHeader && maybeTableSeparator) {
            while (stack.length > 0) {
              const closed = stack.pop();
              html.push('</' + closed.type + '>');
            }

            const headerCells = splitTableCells(content);
            const alignCells = splitTableCells(nextLine);

            html.push('<div class="note-table-scroll"><table><thead><tr>');
            headerCells.forEach((cell, idx) => {
              const align = getTableAlignment(alignCells[idx] || '');
              const alignAttr = align ? ` style="text-align:${align};"` : '';
              html.push('<th' + alignAttr + '>' + escapeHtml(cell) + '</th>');
            });
            html.push('</tr></thead><tbody>');

            i += 2;
            while (i < lines.length) {
              const rowLine = lines[i].trim();
              if (!rowLine || !rowLine.includes('|')) break;
              if (isTableSeparatorLine(rowLine)) {
                i++;
                continue;
              }

              const rowCells = splitTableCells(rowLine);
              if (rowCells.length === 0) {
                i++;
                continue;
              }

              html.push('<tr>');
              rowCells.forEach((cell, idx) => {
                const align = getTableAlignment(alignCells[idx] || '');
                const alignAttr = align ? ` style="text-align:${align};"` : '';
                html.push('<td' + alignAttr + '>' + escapeHtml(cell) + '</td>');
              });
              html.push('</tr>');
              i++;
            }

            html.push('</tbody></table></div>');
            i--;
            continue;
          }

          const isUl = /^[-*]\s+(.+)/.test(content);
          const isOl = /^\d+\.\s+(.+)/.test(content);

          if (isUl || isOl) {
            const listType = isUl ? 'ul' : 'ol';
            const match = isUl ? content.match(/^[-*]\s+(.+)/) : content.match(/^\d+\.\s+(.+)/);
            const itemText = match ? match[1] : '';

            if (stack.length === 0) {
              stack.push({ type: listType, indent: indent });
              html.push('<' + listType + '>');
            } else {
              const last = stack[stack.length - 1];
              if (indent > last.indent) {
                stack.push({ type: listType, indent: indent });
                html.push('<' + listType + '>');
              } else if (indent < last.indent) {
                while (stack.length > 0 && stack[stack.length - 1].indent > indent) {
                  const closed = stack.pop();
                  html.push('</' + closed.type + '>');
                }
                if (stack.length === 0 || stack[stack.length - 1].indent !== indent) {
                  stack.push({ type: listType, indent: indent });
                  html.push('<' + listType + '>');
                } else if (stack[stack.length - 1].type !== listType) {
                  const closed = stack.pop();
                  html.push('</' + closed.type + '>');
                  stack.push({ type: listType, indent: indent });
                  html.push('<' + listType + '>');
                }
              } else if (last.type !== listType) {
                const closed = stack.pop();
                html.push('</' + closed.type + '>');
                stack.push({ type: listType, indent: indent });
                html.push('<' + listType + '>');
              }
            }

            html.push('<li>' + escapeHtml(itemText) + '</li>');
            continue;
          }

          if (content !== '') {
            while (stack.length > 0) {
              const closed = stack.pop();
              html.push('</' + closed.type + '>');
            }
          }

          if (/^(?:---|\*\*\*|___)$/.test(content)) {
            html.push('<hr>');
          } else {
            const headingMatch = content.match(/^(#{1,4})\s+(.+)$/);
            if (headingMatch) {
              const level = headingMatch[1].length;
              html.push('<h' + level + '>' + escapeHtml(headingMatch[2]) + '</h' + level + '>');
            } else if (content) {
              html.push(escapeHtml(content) + '<br>');
            } else {
              html.push('<br>');
            }
          }
        }

        while (stack.length > 0) {
          const closed = stack.pop();
          html.push('</' + closed.type + '>');
        }

        const protectedHtmlSegments = [];
        const protectHtmlSegment = (segmentHtml) => {
          const token = `ZZZPH${protectedHtmlSegments.length}ZZZ`;
          protectedHtmlSegments.push(segmentHtml);
          return token;
        };

        let rendered = html.join('')
          .replace(/!\[(.*?)\]\((.*?)(?:\s+(?:"(.*?)"|&quot;(.*?)&quot;))?\)/g, (match, alt, src, titleQuoted, titleEscaped) => {
            const safeAlt = escapeHtml(alt);
            const title = titleQuoted || titleEscaped || '';
            const srcWithoutTitle = String(src || '')
              .replace(/\s+(?:"[^"]*"|&quot;[^&]*&quot;)\s*$/i, '')
              .trim();
            const trimmedSrc = stripTrailingUrlPunctuation(srcWithoutTitle);
            const isAllowedSrc = /^(https?:\/\/|data:image\/|\.\.?\/|\/)/i.test(trimmedSrc);
            const safeSrc = isAllowedSrc ? trimmedSrc : '#';
            const encodedSrc = safeSrc.replace(/"/g, '&quot;');
            let widthValue = '100';
            const widthMatch = String(title || '').match(/width=(\d+)%/i);
            if (widthMatch && widthMatch[1]) {
              widthValue = String(Math.min(100, Math.max(10, Number(widthMatch[1]) || 100)));
            }
            return protectHtmlSegment(`<img data-note-src="${encodedSrc}" data-note-width="${widthValue}" alt="${safeAlt}" loading="lazy" decoding="async">`);
          })
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/_(.+?)_/g, '<em>$1</em>')
          .replace(/`(.+?)`/g, '<code>$1</code>')
          .replace(/\[(.+?)\]\((.+?)\)/g, (match, text, href) => {
            const rawHref = String(href || '').trim();
            const isAllowedHref = /^(https?:\/\/|mailto:|tel:|\.?\.?\/|\/)/i.test(rawHref);
            const safeHref = (isAllowedHref ? rawHref : '#').replace(/"/g, '&quot;');
            return protectHtmlSegment(`<a href="${safeHref}" target="_blank" rel="noopener">${text}</a>`);
          })
          .replace(/<br><ul>/g, '<ul>')
          .replace(/<br><ol>/g, '<ol>')
          .replace(/<\/ul><br>/g, '</ul>')
          .replace(/<\/ol><br>/g, '</ol>')
          .replace(/ZZZPH(\d+)ZZZ/g, (match, idx) => protectedHtmlSegments[Number(idx)] || '');

        tooltip.innerHTML = rendered;
        loadTooltipImagesNow();
      }

      function positionTooltipFor(el) {
        const rect = el.getBoundingClientRect();
        const pageX = window.scrollX || window.pageXOffset;
        const pageY = window.scrollY || window.pageYOffset;

        tooltip.style.display = 'block';

        const tooltipRect = tooltip.getBoundingClientRect();
        const viewportWidth = window.innerWidth;

        let left = rect.left + pageX;
        let top = rect.bottom + pageY + 6;

        if (left + tooltipRect.width > pageX + viewportWidth - 10) {
          left = pageX + viewportWidth - tooltipRect.width - 10;
        }
        if (left < pageX + 10) {
          left = pageX + 10;
        }

        const maxTop = pageY + window.innerHeight - tooltipRect.height - 10;
        if (top > maxTop) {
          top = rect.top + pageY - tooltipRect.height - 6;
        }
        if (top < pageY + 10) {
          top = pageY + 10;
        }

        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${top}px`;
      }

      function hideTooltip() {
        tooltip.style.display = 'none';
        tooltip.innerHTML = '';
        activeNoteElement = null;
      }

      tooltip.addEventListener('touchstart', function(e) {
        const touch = e.touches && e.touches[0];
        if (!touch) return;
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        touchMoved = false;
        touchStartedInsideTooltip = true;
      }, { passive: true });

      tooltip.addEventListener('touchmove', function(e) {
        const touch = e.touches && e.touches[0];
        if (!touch) return;
        if (Math.abs(touch.clientX - touchStartX) > 8 || Math.abs(touch.clientY - touchStartY) > 8) {
          touchMoved = true;
        }
      }, { passive: true });

      tooltip.addEventListener('touchend', function(e) {
        if (touchMoved) {
          touchStartedInsideTooltip = false;
          return;
        }
        const target = e.target;
        const tappedLink = target && target.closest ? target.closest('a') : null;
        if (!tappedLink) {
          hideTooltip();
        }
        touchStartedInsideTooltip = false;
      }, { passive: true });

      if (supportsHover) {
        document.addEventListener('mouseover', function(e) {
          const noteEl = e.target && e.target.closest ? e.target.closest('.editor-note[data-note]') : null;
          if (!noteEl || !contentRoot.contains(noteEl)) return;

          const noteText = noteEl.getAttribute('data-note');
          if (!noteText) {
            hideTooltip();
            return;
          }

          activeNoteElement = noteEl;
          setTooltipContent(noteText);
          positionTooltipFor(noteEl);
        });

        document.addEventListener('mouseout', function(e) {
          if (!activeNoteElement) return;

          const leavingNote = e.target && e.target.closest ? e.target.closest('.editor-note[data-note]') : null;
          if (!leavingNote) return;

          const enteringTooltip = e.relatedTarget && tooltip.contains(e.relatedTarget);
          if (enteringTooltip) return;

          const enteringNote = e.relatedTarget && e.relatedTarget.closest ? e.relatedTarget.closest('.editor-note[data-note]') : null;
          if (enteringNote === leavingNote) return;

          hideTooltip();
        });
      }

      document.addEventListener('touchstart', function(e) {
        if (isOverlayWidgetTarget(e.target)) return;
        if (!activeNoteElement) return;
        touchStartedInsideTooltip = tooltip.contains(e.target);
        if (!touchStartedInsideTooltip) {
          const touch = e.touches && e.touches[0];
          if (touch) {
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchMoved = false;
          }
        }
        const touchedNote = e.target && e.target.closest ? e.target.closest('.editor-note[data-note]') : null;
        const touchedTooltip = touchStartedInsideTooltip;
        if (!touchedNote && !touchedTooltip) {
          hideTooltip();
        }
      }, { passive: true });

      document.addEventListener('touchmove', function(e) {
        if (isOverlayWidgetTarget(e.target)) return;
        if (!activeNoteElement || touchStartedInsideTooltip) return;
        const touch = e.touches && e.touches[0];
        if (!touch) return;
        if (Math.abs(touch.clientX - touchStartX) > 8 || Math.abs(touch.clientY - touchStartY) > 8) {
          touchMoved = true;
        }
      }, { passive: true });

      document.addEventListener('touchend', function(e) {
        if (isOverlayWidgetTarget(e.target)) return;
        if (touchStartedInsideTooltip || touchMoved) return;

        const touchedNote = e.target && e.target.closest ? e.target.closest('.editor-note[data-note]') : null;
        if (touchedNote && contentRoot.contains(touchedNote)) {
          const noteText = touchedNote.getAttribute('data-note');
          if (!noteText) {
            hideTooltip();
            suppressClickUntil = Date.now() + 600;
            return;
          }

          if (activeNoteElement === touchedNote) {
            hideTooltip();
          } else {
            activeNoteElement = touchedNote;
            setTooltipContent(noteText);
            positionTooltipFor(touchedNote);
          }
          suppressClickUntil = Date.now() + 600;
          return;
        }

        if (activeNoteElement) {
          hideTooltip();
          suppressClickUntil = Date.now() + 600;
        }
      }, { passive: true });

      document.addEventListener('click', function(e) {
        if (Date.now() < suppressClickUntil) return;

        const noteEl = e.target && e.target.closest ? e.target.closest('.editor-note[data-note]') : null;
        if (noteEl && contentRoot.contains(noteEl)) {
          const noteText = noteEl.getAttribute('data-note');
          if (!noteText) {
            hideTooltip();
            return;
          }

          if (activeNoteElement === noteEl) {
            hideTooltip();
          } else {
            activeNoteElement = noteEl;
            setTooltipContent(noteText);
            positionTooltipFor(noteEl);
          }
          return;
        }

        if (tooltip.contains(e.target)) return;

        if (activeNoteElement) {
          hideTooltip();
        }
      });

      window.addEventListener('scroll', function() {
        if (activeNoteElement) {
          positionTooltipFor(activeNoteElement);
        }
      }, { passive: true });

      window.addEventListener('resize', function() {
        if (activeNoteElement) {
          positionTooltipFor(activeNoteElement);
        }
      });
    })();
  </script>

  <!-- H1 Navigation with Arrow Keys -->
  <script>
    (function() {
      let h1Elements = [];
      let currentH1Index = -1;
      const prefetchedImages = new Set();

      function toAbsoluteUrl(src) {
        try {
          return new URL(src, window.location.href).href;
        } catch (_) {
          return src;
        }
      }

      function prefetchImage(src) {
        if (!src) return;
        const abs = toAbsoluteUrl(src);
        if (!abs || prefetchedImages.has(abs)) return;
        prefetchedImages.add(abs);

        const img = new Image();
        img.decoding = 'async';
        img.src = abs;
      }

      function getSectionImagesByH1Index(index) {
        if (index < 0 || index >= h1Elements.length) return [];
        const currentH1 = h1Elements[index];
        const nextH1 = index < h1Elements.length - 1 ? h1Elements[index + 1] : null;
        const sectionImages = [];

        let node = currentH1;
        while (node && node !== nextH1) {
          if (node.nodeType === 1 && node.tagName === 'IMG') {
            sectionImages.push(node);
          }
          if (node.querySelectorAll && node !== currentH1) {
            node.querySelectorAll('img').forEach(img => sectionImages.push(img));
          }
          node = node.nextElementSibling;
        }

        if (sectionImages.length === 0) {
          currentH1.querySelectorAll('img').forEach(img => sectionImages.push(img));
        }

        return sectionImages;
      }

      function prefetchAssetsAroundH1(index) {
        const targets = [index, index - 1, index + 1, index - 2, index + 2]
          .filter(i => i >= 0 && i < h1Elements.length);

        targets.forEach(i => {
          const images = getSectionImagesByH1Index(i);
          images.forEach(img => prefetchImage(img.getAttribute('src')));
        });
      }

      // Function to update h1 elements list
      function updateH1List() {
        h1Elements = Array.from(document.querySelectorAll('#content h1'));
      }

      // Function to scroll to h1 element
      function scrollToH1(index) {
        if (index >= 0 && index < h1Elements.length) {
          const h1 = h1Elements[index];
          const headerHeight = document.querySelector('header').offsetHeight || 0;
          const yOffset = -headerHeight - 20; // Add some extra padding
          const y = h1.getBoundingClientRect().top + window.pageYOffset + yOffset;

          window.scrollTo({ top: y, behavior: 'auto' });
          currentH1Index = index;

          // Visual feedback - briefly highlight the h1
          h1.classList.remove('md-h1-jump-highlight');
          void h1.offsetWidth;
          h1.classList.add('md-h1-jump-highlight');
          if (h1._mdJumpHighlightTimer) {
            clearTimeout(h1._mdJumpHighlightTimer);
          }
          h1._mdJumpHighlightTimer = setTimeout(() => {
            h1.classList.remove('md-h1-jump-highlight');
            h1._mdJumpHighlightTimer = null;
          }, 850);

          prefetchAssetsAroundH1(index);
        }
      }

      // Function to find current h1 based on scroll position
      function findCurrentH1() {
        const scrollPosition = window.scrollY + 100; // Offset for header

        for (let i = h1Elements.length - 1; i >= 0; i--) {
          if (h1Elements[i].offsetTop <= scrollPosition) {
            return i;
          }
        }
        return 0;
      }

      // Button Handlers for Mobile
      const prevH1Btn = document.getElementById('prevH1Btn');
      const nextH1Btn = document.getElementById('nextH1Btn');

      if (prevH1Btn) {
        prevH1Btn.addEventListener('click', (e) => {
          e.preventDefault();
          // Update list if needed (in case content changed)
          if (h1Elements.length === 0) {
            updateH1List();
          }
          if (h1Elements.length === 0) return;

          if (currentH1Index === -1) {
            currentH1Index = findCurrentH1();
          }
          const prevIndex = (currentH1Index - 1 + h1Elements.length) % h1Elements.length;
          scrollToH1(prevIndex);
        });
      }

      if (nextH1Btn) {
        nextH1Btn.addEventListener('click', (e) => {
          e.preventDefault();
          // Update list if needed (in case content changed)
          if (h1Elements.length === 0) {
            updateH1List();
          }
          if (h1Elements.length === 0) return;

          if (currentH1Index === -1) {
            currentH1Index = findCurrentH1();
          }
          const nextIndex = (currentH1Index + 1) % h1Elements.length;
          scrollToH1(nextIndex);
        });
      }

      // Listen for arrow key presses
      document.addEventListener('keydown', (e) => {
        const activeEl = document.activeElement;
        const isWidgetTarget = (el) => {
          return !!(el && el.closest && el.closest('#chat-widget, #notes-widget-container, #update-notification, #message-options-menu, .reaction-picker'));
        };
        if (isWidgetTarget(activeEl) || isWidgetTarget(e.target)) {
          return;
        }
        // Ignore if user is typing in an input field
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.isContentEditable))) {
          return;
        }

        // Update list if needed (in case content changed)
        if (h1Elements.length === 0) {
          updateH1List();
        }

        if (h1Elements.length === 0) return;

        // Right Arrow - next h1
        if (e.key === 'ArrowRight') {
          e.preventDefault();
          if (currentH1Index === -1) {
            currentH1Index = findCurrentH1();
          }
          const nextIndex = (currentH1Index + 1) % h1Elements.length;
          scrollToH1(nextIndex);
        }

        // Left Arrow - previous h1
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (currentH1Index === -1) {
            currentH1Index = findCurrentH1();
          }
          const prevIndex = (currentH1Index - 1 + h1Elements.length) % h1Elements.length;
          scrollToH1(prevIndex);
        }
      });

      // Initialize h1 list when content loads
      function initH1Navigation() {
        setTimeout(() => {
          updateH1List();
          if (h1Elements.length > 0) {
            const initialIndex = findCurrentH1();
            prefetchAssetsAroundH1(initialIndex);
          }
        }, 500);
      }

      // Watch for content changes
      const contentDiv = document.getElementById('content');
      if (contentDiv) {
        const observer = new MutationObserver(() => {
          updateH1List();
          if (h1Elements.length > 0) {
            const idx = currentH1Index >= 0 ? currentH1Index : findCurrentH1();
            prefetchAssetsAroundH1(idx);
          }
        });

        observer.observe(contentDiv, {
          childList: true,
          subtree: true
        });
      }

      // Initialize on page load
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initH1Navigation);
      } else {
        initH1Navigation();
      }
    })();
  </script>

  <style>
    /* Notes Widget Styles */
    #notes-widget { --notes-primary: #588157; --notes-secondary: #efebe9; --notes-border: #588157; --notes-text: #2c1810; --notes-text-light: #6d4c41; }
    .notes-widget { position: fixed; bottom: 20px; left: 20px; z-index: 4999; font-family: var(--app-ui-font); }
    .notes-panel { position: fixed; bottom: 90px; left: 20px; width: 400px; height: 500px; background: white; border-radius: 12px; box-shadow: 0 5px 40px rgba(0, 0, 0, 0.16); display: flex; flex-direction: column; opacity: 0; pointer-events: none; transform: translateY(20px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .notes-header { padding: 16px; border-bottom: 1px solid var(--notes-border); display: flex; justify-content: space-between; align-items: flex-start; background: linear-gradient(135deg, #588157 0%, #588157 100%); color: white; border-radius: 12px 12px 0 0; }
    .notes-header-title h3 { margin: 0 0 4px 0; font-size: 16px; font-weight: 600; }
    .notes-close-btn { background: rgba(255, 255, 255, 0.15); border: none; color: white; font-size: 20px; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: background 0.2s; }
    .notes-close-btn:hover { background: rgba(255, 255, 255, 0.25); }
    .notes-container { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    .notes-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .notes-input-area { display: flex; gap: 8px; padding: 12px; border-top: 1px solid color#588157; background: #fafafa; flex-direction: column; border-radius: 0 0 12px 12px; }
    .notes-input { flex: 1; border: 1px solid color #588157; border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; transition: all 0.2s; resize: vertical; max-height: 80px; min-height: 40px; }
    .notes-input:focus { border-color: #588157; box-shadow: 0 0 0 3px rgba(88, 129, 87, 0.1); }

    .notes-send-btn:hover { background: #588157; transform: scale(1.05); }
    .notes-send-btn:active { transform: scale(0.95); }

    /* Note item styles */
    .note-item { animation: slideIn 0.3s ease; }
    .note-reply { animation: slideIn 0.3s ease; }

    @media (max-width: 900px) {
      .notes-widget, .notes-panel { bottom: 20px; left: 20px; }

<!-- Hydration Script: Ensures fresh content on reload even if sessionKey is present -->
<script>
  (function() {
    // Only run if courses data is available
    if (typeof courses === 'undefined') return;

    function getParam(name){ const u=new URL(window.location.href); return u.searchParams.get(name); }
    const path = getParam('path');
    if (!path) return;

    const decodedPath = decodeURIComponent(path);
    const normalizedPath = decodedPath.replace(/\\/g, '/');

    // Attempt to find the file in the fresh courses data
    const result = findFileInCoursesByPath(normalizedPath);
    const fileData = result && result.item;

    // If we found the file and it has content (e.g. msgNote), force update the view
    // This overrides whatever might have been loaded from stale sessionStorage
    if (fileData && fileData.content) {
      debugLog('Hydrating content from fresh courses data for:', normalizedPath);
      const root = document.getElementById('content');
      renderViewerContent(root, fileData.content, normalizedPath, {
        type: fileData.type,
        styleMode: 'none'
      });
    }
  })();

</script>
