<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Session Bridge</title>
</head>
<body>
  <script>
    (function () {
      const allowedOrigins = new Set([
        'https://files.coursebook.lol',
        'https://chat.coursebook.lol',
        'https://coursebook.lol',
        'https://files.blackboard.lol',
        'https://blackboard.lol'
      ]);

      window.addEventListener('message', function (event) {
        if (!allowedOrigins.has(event.origin)) return;
        const data = event.data || {};
        if (data.type !== 'COURSEBOOK_GET_SESSION') return;

        const loggedInUser = localStorage.getItem('loggedInUser');
        const chatStateKeys = [
          'lastReadMessage_global-chat',
          'notificationsDisabled_global-chat',
          'showMembers_global-chat'
        ];
        const chatState = {};
        for (const key of chatStateKeys) {
          const value = localStorage.getItem(key);
          if (typeof value === 'string') {
            chatState[key] = value;
          }
        }

        event.source.postMessage(
          {
            type: 'COURSEBOOK_SESSION',
            loggedInUser: loggedInUser || null,
            chatState
          },
          event.origin
        );
      });
    })();
  </script>
</body>
</html>
